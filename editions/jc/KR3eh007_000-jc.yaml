body:
  text: 婦人雜症落三月胎論今夫男女媾精萬物化生二氣交感凝結成形自有造化之妙原從虛無中來也內經云二七而天癸至任脈通太衝脈盛月事以時下故有子考之經旨婦人有孕又當責在少陰須逐月養胎衝任堅固以保無虞何至未足月而半產哉第其間情欲感觸胎落者有之思慮過度胎落者有之跌撲損傷胎落者有之破膽驚心胎落者有之此亦有所因而動無足怪者獨葉孕三月兢兢自持至期必動醫家非涼血則固氣非升舉則利氣百藥不效其胎必墮皆由易於受而後易於墮也而墮之之故果安在哉蓋胎繫於脾而根於腎一年而屢孕者相火之有餘也三月而屢墮者相火之過旺也屢墮而不先不後者脾土主有信也繆氏謂三月陽明脈養胎其人脾土素弱而相火搖搖風木侮之無故自落豈尋常意見所能補救者耶必也戒怒以舒肝卻慮以安脾節欲以養腎然後用先君子豬肚丸藥清相火以實脾土土旺則四臟之氣皆旺精自生而氣自固不必慮難安易落之胎矣雖然藥宜服於未孕之先莫遲服於已孕之後所謂未雨綢繆不治已病治未病也若巢氏以三月屬手少陰脈養胎雖雄雞湯可用而藥進不驗書其可盡信乎余熟思之土生萬物補脾尤急土載萬物養胃為先從衝任為受孕之原亦必脾腎雙補而更有益何也無形之土能生無形之水水壯相火亦靜三月易落之胎變為足月而產矣且胎落在單月居多單為陽數三月又屬老陽之數其人腎陰既虧脾土既弱相火又盛肝木易泄值此三而九之之候陽數過亢陰液受耗脾中之血亦復消灼似難保其根深而蒂固況庸手更不諳脾為生血之源腎為立命之根而徙泥當歸之辛杜仲之溫艾葉之熱以安胎散為神方而堅守之遂深信胎無不安也者豈其然乎症無剩義筆有餘妍繆氏之說得此更明約齊豬肚丸元參二兩酒蒸苦參二兩酒蒸丹參三兩山藥三兩炒穀芽二兩炒扁豆二兩炒石斛二兩白芍二兩酒炒芡實二兩炒蓮肉二兩去心炒南沙參四兩鍋焦米二兩茯苓二兩人乳拌蒸人參三兩切片研末另入甘草一兩五錢蒸用雄豬肚一具將藥裝入蒸熟搗爛焙乾為末煉蜜為丸每早白滾湯下五錢豬肚先用水酒洗淨裝藥雄雞湯妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背痛卒有所下宜服此湯雄雞一隻治如食法黃芩白朮生薑各一兩麥冬五合芍藥人參茯苓甘草阿膠各一兩大棗十二枚劈上㕮咀以水一斗三升煮雞減半出雞納藥湯中煮取一半納清酒三升並膠煎取三升分三服一日食盡取效子癇竊怪子癇為病古人謂之風痙印定後人眼目牢不可破害人不淺即令柔痙所發原屬大虛並非外風中入張景岳於此症議論暢快辨之甚悉醫人熟讀胸中變化用之以治子癇也又何不可哉夫婦人有孕之後衝任血養胎元致肝少血而木火動搖搖靡定風象生焉其症目吊口噤角弓反張流涎昏迷時作時止知內傷之癇象同而非厥也俗醫以為外入之風真屬聾聵試問風入皮毛則當惡寒發熱何表症未見而厥少之症疊出是無孕安然有胎反病風果如是耶症亦無恙耶真令人不解也余審其病情無非肝腎陰虛陰虛則血燥血燥則筋失所滋強直反張有似於風而實非風即風亦屬內動之風而實非六淫之風也故胎在母腹陰血愈耗虛火愈熾經脈空而為火所灼致精不能養神柔不能養筋而如厥如癲神魂失守復又誤投外風之藥變症多端豈非病者之厄哉且癇與厥症相似而實非厥則終朝昏憒癇則或有醒時厥則晝夜無聲癇則忽然叫喊厥回身寒熱癇醒口流涎其見症之不同如此而臨症安可不細察耶是以治癇之法有在陰在陽之別陰虛者養陰陽虛者養陽庶陰液足而真氣回木火藏而虛風定子安母亦無不安矣然考之古方有羚羊角散以為治子癇之聖藥不知亦錯認此風為外入之風而藥多不合惟羚角一味入肝舒筋棗仁當歸補肝益血與症相投奈內有防獨則耗真元又有薏苡則下生胎古方其可輕用乎嗚呼學古不化則生人者反殺人方書盡信則去疾者反增疾真紙上談兵托諸空言不能見諸行事者也見得明說得透灶下之嫗亦當領會羚羊角散治妊娠中風頭項強直筋脈攣急言語蹇澀痰涎壅盛或時發搐不省人事謂之子癇羚羊角獨活棗仁炒五加皮各八分苡仁防風當歸川芎茯神杏仁各四分木香甘草各二分加姜三片水煎服寧神養榮湯治妊娠氣血兩虛因而卒倒或時心神潰亂恍忽昏運此方主之歸身二錢人參一錢五分麥冬一錢五分茯神一錢遠志甘草湯炒一錢熟地二錢白芍一錢炒白朮一錢土炒加桂元肉五枚水一鍾煎八分食遠服產後泄瀉產後泄瀉一症有外因食滯是也有內因脾腎虛是也夫胎繫於脾脾中之血為胎所耗產後脾土失健運之常復又食物無節生冷不慎致中焦不化而噫氣噯腐腹中腸鳴大便下泄矣體實輩用平胃散加減在一二劑之間不可多進也體虛輩平日脾土薄弱產後更弱而夾食不消者用長生活命湯投之百試百效設純用楂樸檳卜之屬耗其真元其人必死此治外因者也若內因傷在脾腎最為產後之惡症蓋脾司倉廩後天根本生血液以灌溉四臟如脾中血虛而生火則暴注下迫疾走大腸如脾中氣虛而生寒則運行失職完穀不化產後氣血內空食飲入胃不能變化精微升清降濁而時時頻泄未免下多陰亡泄久陽亡之患矣至於腎為生氣之原命火能生脾土為人生立命之根蒂產後去血過多則傷腎中之陰氣因血耗則傷腎中之陽陰虛者火必刑金上逆作咳肺虛熱移大腸下通作泄醫家不知有腎陰虧虛泄瀉之症一味補土未見奏功若誤認夾食更為醫中之庸者矣蓋陽虛泄瀉必命火衰微己土不生而真氣不固非如陰虛有火者脈細數面赤口渴為異也況陽虛脈必細遲而微或空大而虛面色慘淡手足冷而浮腫自有症脈虛寒之真象醫家宜細心體會者也治脾陰虛而有火者嘉禾飲為必用之藥脾氣虛而無火者六君子湯為必用之藥腎虛而有火者六味加人參湯為必用之藥陽虛而無火者八味加人參湯為必用之藥倘服此而泄瀉不止四神丸用參湯吞下更為治泄之神丹再用枯礬附子五倍子研末和麵人唾作餅貼臍中無不立驗此治內因者也內經曰腎者胃之關又曰腎主開闔開竅於二陰治脾泄者亦宜治腎況腎泄乎補脾不如補腎之說亦未之聞乎內因外因分開兩門又處處提出產後與平常泄瀉不同精義不磨平胃散蒼朮五斤泔浸七日陳皮三斤去白厚朴三斤薑汁炒甘草十二兩炙上共為末白滾湯調服三五錢長生活命飲見燥症門嘉禾飲苡仁二錢扁豆二錢炒丹參一錢五分茯苓一錢白芍一錢炒山藥一錢炒穀芽一錢炒沙參一錢人參一錢石斛一錢陳皮八分神麯八分半夏曲八分蓮子七粒去心炒甘草五分黑棗三枚水煎服六君子湯見中風門六味湯八味湯均見審虛虛門四神丸破故紙四兩炒肉豆蔻麵裹煨五味子各二兩吳茱萸一兩湯炮炒上為末用大棗百枚生薑八兩煮爛取棗肉搗丸桐子大每服七八十丸空心或食前淡鹽湯或滾湯下產後血暈產後血暈有虛實之各異實者瘀血之假實而虛者氣血之真虛也夫血由氣化氣行則血行氣滯則血阻是血隨氣流轉者也胎下之後陰血暴行氣分驟虧失於運動故將下未下之血停蓄成瘀上衝胸腹作痛斯時頭目掉眩迷亂心神眼前生花劇則人事昏憒牙關不開外治或燒漆器或薰醋炭內治宜生化湯加失笑散體素陰虛者加童便體素陽虛者加肉桂體虛甚者加人參世俗惑於用參瘀反不行之說印定後人眼目不敢輕用致元氣下陷而脫者多矣此假實之症也若去血過多氣孤無偶察其外症眼合口張面白手撒氣出多而入少手足冷而厥逆冷汗自出脈細如絲或浮大無根此腎氣不納而肺氣不主根本搖搖氣虛欲脫之象也治宜血脫益氣陽生陰長用人參兩許而以歸地姜附佐之庶可救垂危於欲絕此真虛之症也要之實中有虛瘀去而真虛自現虛中更虛血枯而真氣亦離切勿信古載牡丹奪命等方以散血而損人命也醫家其慎諸暈因於血血之瘀氣之弱也粗工熟能察此惟先生言之鑿鑿生化湯當歸五錢川芎二錢炮姜一錢甘草五分炙桃仁十粒去皮尖雙仁不用水二鍾加酒少許煎好溫服失笑散蒲黃揀淨五靈脂揀去砂石等分俱炒上為末每服二三錢酒煎熱服參附回生湯治產後氣血暴去過多急用此方人參三錢熟地三錢當歸二錢炮姜一錢附子一錢白朮二錢土炒陳米炒熟水煎服產後發熱產後發熱有內傷有外感有瘀血有食滯症各不同脈亦迥異醫家宜詳辨之也蓋外感發熱因產後空虛風寒乘虛而易入其症惡寒發熱頭痛身痛脈浮緊而數用表藥一二劑可愈若感時令疫熱之邪寒短熱長頭痛身痛口渴譫語脈浮數或細數用扶正逐疫藥治之然所發與血虛發熱無異但此時必疫邪盛行或為他入傳染或因未產之先症雖有別而救元則一也若有瘀血不行阻塞氣道或腹中作痛或經絡作腫亦大發熱其脈芤數宜去瘀生新藥治之若有食滯發熱必嘔吐噯腐腹痛泄瀉脈大而滑宜消導藥治之若下血過多孤陽無偶浮越於外壯熱不退煩躁不寧譫語不休湯飲不絕脈浮大空數宜大補氣血藥治之古人有言產後類傷寒三陽症惡寒發熱頭痛毋認為傷寒太陽症發熱頭痛乍寒乍熱或兼脅痛毋認為少陽症潮熱有汗大便不通毋認為陽明症蓋由氣血兩虛陰陽不和而類外感且產後重發汗汗發則虛而禍至矣產後類傷寒三陰症腹滿咽乾大便實勿專論為太陰症口燥咽乾勿專論為少陰症又汗出譫語便秘勿專論為胃中有燥屎宜下數症多由勞倦傷脾運化艱難氣血枯竭腸腑燥渴乃虛症類實所當補者也夫產後之熱氣血兩虛者居多藥宜甘溫陰虛生熱者或有藥宜壯水丹溪大補氣血之論不可泥丹溪大補氣血之論正可法也先君子治產後壯熱發狂持刃殺之用附子一枚人參一兩童便一杯一劑霍然甘溫能除大熱也余治侄女產後陰虛發熱口渴面赤六味湯加童便一劑成功壯水之主以鎮陽光也即如產後感風寒染時疫而發熱亦必以養正為主蓋正旺則邪不攻而自走矣至於仲景論產後有實症必其人體實脈實邪可攻者攻之若其人體虛脈虛而復又攻之則殺人之禍在於反掌間矣醫可不自惕歟產後發熱用藥專以溫補為主亦非確論大約產後之熱宜從陽引陰反佐從治者居多以陰血驟虧孤陽外越非大溫大補則虛火不藏所謂甘溫能除大熱是也倘其人陽有餘而陰不足之體一遇產後發熱泥於甘溫退熱之法薑桂參附多進陰益虧而火益熾熱愈不退宜從陰引陽壯水正治方可取效古人謂芍藥酸寒以為產後忌藥而仲景謂陰氣散失正當用之真知陰可維陽水可制火者也總之人生屬陰陽互根不可偏勝一味溫熱知有陽而不知有陰矣條分縷晰著法立方真是長沙復出六味湯見審虛實門人參當歸散治產後去血過多血虛則陰虛陰虛子午不交非大補真陰填實下元不能挽回垂危於欲絕第陰血暴脫真氣上越草根木皮一時難生有形之血不若重進參附歸地及鹿茸河車之屬急生無形之氣且同類有情血肉為補庶無根之焰漸漸歸原而相傳之官清肅下行矣倘惡露未盡敗血停凝上薰肺金亦令人喘須進人參生化湯逐瘀於補元之中元氣回而瘀血通間有得生未可知也若其人平素原有哮喘之疾因胎下偶受外風舊疾亦作宜金水六君煎主之難經曰呼出心與肺吸入腎與肝今產後呼出多而吸入少衛氣無主大補猶恐不回而醫家不悟仍以表散之藥投之以迎合病家之意是耶非耶凡喘症虛多實少況屬產後而喘忽發虛耶實耶庸工何不察也人參生化湯人參三錢當歸五錢川芎二錢炮姜一錢甘草五分炙桃仁十粒去皮尖水二鍾加酒少許煎一鍾溫服金水六君煎熟地三五錢當歸二錢茯苓二錢半夏三錢陳皮一錢五分甘草一錢炙水二鍾姜五七片煎八分食遠溫服產後腹痛大凡腹痛者皆責在脾土而產後耗脾中之血非大補脾元難以生陰液而定痛者也第痛有虛實寒熱瘀血之不同而用藥迥別苟非察脈辨症細心體會未有不殺人於反掌間者矣夫痛之生也喜按為虛拒按為實喜熱飲為寒喜冷飲為熱而瘀血之痛則按之為更甚勿以通則不痛之說遂謂產後逐瘀為第一義也蓋脾主血而生血養胎既虛在先胎下復虛在後脾元不運痛而面赤口渴潮熱大便秘按之稍定脈細數等症無非陰虧而火動治宜芍藥甘草湯加丹參沙參熟地當歸之屬投之自然陰血生而虛火靜營衛調而痛亦止矣若脾臟虛寒氣不運行痛而面青曰手足冷冷汗出大便泄按之稍定脈細遲等症無非陽虛而火衰治宜六君合生化湯加桂附投之自然元陽回而真氣復營衛調而痛亦止矣倘瘀血內蓄積塊未消傷在衝任臍之上下乃二脈所由之道瘀血塞而不行衝任虛而受困按之疼痛雖實也而實中挾虛耳治宜生化湯除瘀生新俾瘀從舊路下走腹痛亦可止若一味逐瘀而不顧元氣將見攻愈急而痛愈甚正愈虧而瘀愈阻瘀愈阻而藥愈亂變症百出豈能保全乎臨症者宜視其人平素體氣壯實用生化湯加延胡丹參莫不應手取效視其人平素體虛用生化湯加人參桂附氣壯易動此萬舉萬當之法也又有小腹有塊作痛名曰兒枕宜補中逐瘀可也舊血須當消化新血亦當生養如專主攻舊新亦不寧矣張景岳云子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非真塊腫既未消是以亦頗拒按但宜安養其臟不久即愈景岳之說深合病情可見少腹之痛與臍上之痛部位雖不同而瘀血為害則一也補中之消消中之補並行不悖斯為醫中之良手矣設無血塊但小腹作痛按之少止此屬血海空虛生化湯加熟地肉桂取效亦甚速也內經曰腹為陰陰中之陰脾也治腹痛者其可不知溫養脾土而生陰血耶產後腹痛主溫養脾土而生陰血非泛論腹痛真產後腹痛之論也十全大補湯見盜汗門參歸生化湯見產後喘門四物湯熟地三錢當歸三錢白芍二錢炒川芎一錢水煎服六君子湯見中風門補中益氣湯見暑症門八味地黃湯見審虛實門芍藥甘草湯白芍五錢炒甘草一錢水一鍾煎八分服定痛散治產後惡血不止腹中作痛當歸四錢白芍三錢炒肉桂五錢加姜五片水煎服產後嘔吐嘔吐有虛實而產後之嘔吐虛者十居其九醫家不從症脈詳察而混以尋常止嘔定吐之法投之則殺人之禍立至雖有良工補救亦無如之何矣夫產後脾胃必虧因去血過多而耗傷也脾胃虛而熱則食入即吐脾胃虛而寒則食久反出然亦不可拘也倘其人平素脾元大虛加之產後傷氣血脾陰枯而胃陽敗忽然食入即吐全不納穀手足冷冷汗出氣促不接脈懸懸如絲如此危症乃胃絕之候也而遂謂其暴吐為有火哉即令嘔吐酸味雖屬有火而產後之吐酸多責在胃寒必須切脈之遲數或有力或無力然後虛實可分如有火而吐者宜扁豆穀芽沙參丹參石斛陳壁土之類主之如無火而吐者宜人參白朮茯苓黑姜肉桂炙甘草之類主之薛氏法最良也雖然腎者胃之關也脾胃之病必推原於腎腎氣壯則水穀入胃散精於肺而變化精微腎氣虧則完穀不化陽火衰弱而不生脾土幽門少運動之機下不通而勢必上逆矣又有腎陽無根內真寒而外假熱虛火上衝胃口嘔吐不休者非附子理中湯八味地黃湯重加人參引火歸原而吐未必定也或者謂敗血散於脾胃不能納水穀而生吐逆此說亦中病情第敗血之阻由元氣之虧非生化湯則二陳湯加人參澤蘭葉丹參之屬進之數劑可愈若用藿香砂仁延胡等藥一味破氣正氣轉傷非其治也大約吐而輕者救在脾吐而重者救在腎舍此他求豈足謂之善醫產後者耶症不因產後而生固可以雜症之法治之症既因產後而生亦混投尋常之法非治也此嘔吐又以救脾救腎為主八味地黃湯見審虛實門二陳湯見眩暈門附子理中湯見審虛實門生化湯產後血暈門加減四君湯治脾虛產後嘔吐白朮二錢土炒炮姜八分炙甘草一錢人參一錢炒陳米五錢吐甚者加附子八分水煎服產後不寐產後不寐一症由於氣血大虧陰不維陽者居多也夫衛氣日行於陽則寤夜行於陰則寐凡人將睡之時必陽引而升陰引而降陰陽相引然後呵欠乃作漸入睡鄉矣今胎下而血驟脫陽浮於上不入陰而常留於陽是以達旦不寐煩躁出汗面赤口渴等症疊見而醫家之治此者其法果何在哉蓋壯水則火熄而神安益陰則血足而心寧六味歸芍湯加童便人參無不應手取效若心腎不交神志恍惚補心丹加減亦為合法倘血去而孤陽浮越營衛偏勝終夜不眠宜歸脾湯或人參養營湯加減方為盡善大抵陰虛不寐陽藥不宜輕投陽虛不寐陰藥豈宜混施必須察脈辨症心靈會悟勿泥呆法者也此外血塊痛而不寐者治在血也血行而痛定可以安臥矣兼食滯而不寐者治在食也食消而痛止可以安臥矣兼時疫而不寐者治在疫也疫退而熱解可以安臥矣兼瘧痢而不寐者治在瘧痢也瘧痢止而神斂可以安臥矣張景岳云心藏神為陽氣之宅衛主氣司陽氣之化凡衛氣入陰則靜靜則寐正以陽有所歸故神安而寐也又心為事擾則神動神動則不靜是以不寐也故欲求寐者當養陰中之陽及去靜中之動則得之矣彼產後陰血虧而陽火動非純靜之藥無以制其炎炎之勢雖欲高枕而望其酣睡也不亦難哉產後去血必多治主純靜之藥以鎮動陽陽不浮越得其所歸則神安而寐六味歸芍湯見中風門補心丹見不寐門歸脾湯見中風門人參養營湯見中風門產後大便不通大便不通在雜症有陽明實熱之積有腸胃瘀血之阻而在產後則責在氣血之虛也夫陰血驟脫氣亦驟虧少陰失開闔之令大腸少津液之潤是以秘結不解醫家不窮其原急用硝黃巴牛等藥求其暫通取快一時因而重虛其虛元氣更受耗傷緩則復秘而變脹滿速則亡陰而致虛脫甚可憫也夫產後空虛新血未生元氣未回幸得後門堅固旬日未解亦自無妨雖有澀滯當從緩治宜用生化湯加人乳肉蓯蓉以潤枯涸倘氣因血耗傳化失職宜用八味湯加人參肉蓯蓉以助真氣無不應手取效者也古人有言產後大便日久不通由血少腸燥參乳湯多服則血旺氣順自無便澀之病真先得我心之同者矣蓋陰血乾燥須俟地道升而天氣降元氣衰弱更待真陽復而真陰生此自然之道也不然徒知推下一法而漫無變計不亦為古人所譏謂之矢醫耶通以治塞印定庸工眼目得此可喚醒其夢生化湯見產後血暈門八味湯見審虛實門參乳湯見燥症門產後變痙痙分剛柔虛者十居六七而產後之變痙則無不本於氣血大虧者也當胎下之後血去過多陽孤無依斯時類傷寒三陽症而實大異類傷寒三陰症而實不同醫家不察脈辨症始進表汗之劑繼投攻下之藥亡陰亡陽致氣愈虛而血愈耗筋脈失於榮養燥極生風反張強直口噤拳攣險症疊出而命難全矣夫血液枯涸大傷衝任二脈而督脈在背亦少柔和因產後而重虛其虛反有類傷寒太陽發痙之大實症耳治法責在肝腎陰陽兩救陰虛者人參六味湯陽虛者加參生化湯或十全大補湯大劑投之俾真氣流轉精血相通筋脈得以滋潤而惡症始退內經曰陽氣者精則養神柔則養筋產後亡血而又誤汗誤下亡陰而又亡陽矣可笑庸手復認作傷寒之症誤治錯中之錯殺人之禍可勝言哉且傷寒汗下過多亦變發痙並宜大補氣血為主則產後之大補氣血更無疑矣若不因藥誤初病即汗出不止而發痙者乃陽氣頓虛腠理不密津液妄泄急用人參養營湯加附子主之丹溪曰產後不論脈症當以大補氣血為主若產後而變痙症空虛極矣舍大補而何所取哉痙病多因誤汗誤下虛虛之禍誰實致之然則實病或儕伍可療虛症須參問醫王六味湯見審虛實門加人參生化湯見產後喘門十全大補湯見盜汗門人參養營湯見中風門產後瘀血流注經絡今夫血主於心資於腎藏於肝統於脾而陽明又為多氣多血之海下通衝任為女子月事應時而下受胎之地也葉孕之後稟賦虛而肝腎虧一身氣血僅僅養胎及產後血泄過多氣因血耗不能逐瘀下出反流注經絡阻塞關節斯時惡寒發熱或腫或痛醫家不明其故概以風寒停滯目之藥非表散即是消導豈知血因散而益虧氣因消而益弱變症多端而病勢危矣余每遇此症急進十全大補湯大培氣血俾脈中脈外營衛之氣得以通暢流行而在經在絡蓄積之瘀不待攻逐而從外自走成膿而潰者有之故道而出者有之十可保全三四若一味逐瘀不救根本如木香流氣飲回生丹之類妄投未有能生者也即體氣稍實而產有此症法宜攻補兼施或先補而後攻或先攻而後補是在臨症之權衡也蓋血隨氣而至氣行則血行氣虛則血阻欲求其故可不急急於救元而加之意哉且惡露而流注於腰臀腿足之處漫腫結塊宜內服參歸生化湯以散血滯外用蔥熨患處以消積瘀無緩也憎寒惡寒陽氣虛也日晡內熱陰血虛也飲食嘔吐胃氣虛也食少體倦脾氣虛也四肢逆冷小便頻數腎氣虛也陽虛則補陽十全大補湯加鹿茸河車陰虛則補陰四物湯加人參白朮胃虛則益胃六君子湯加炮姜脾虛則補脾補中益氣湯加茯苓半夏腎虛則補腎八味地黃湯加菟絲子益智仁此萬全之法也內經曰營氣不從逆於肉理今瘀血不從而逆於腠理者其為營氣不從乃此症之確據乎此症人所難曉每以產後血虛混之即知之而亦無此透徹十全大補湯見盜汗門參歸生化湯見產後喘門四物湯見產後腹痛門六君子湯見中風門補中益氣湯見暑症門八味地黃湯見審虛實門辨胸脅痛後臨經變症病本肝腎之陰虧衝任之脈弱血海空虛虛火內發瘀血阻塞致肝火挾衝任二脈而上逆胸脅脹痛醫投利氣胸脅之痛減非痛減也利氣而火暫降在腹而脹痛矣醫又投利氣腹中之痛減非痛減也利氣而火暫降在少腹而脹痛矣醫再投利氣而痛減非痛減也血室為利氣藥所耗血隨氣下而月事亦動變症百出矣夫肝主藏魂少腹乃肝之部位與衝任及陽明相照應陰血既行虛火更熾復鼓動陽明之火乘灼胞絡故忽然厥逆目定神昏見鬼譫妄診其脈不急數觀其症不發熱非外入之疫邪實神魂之離舍皆由初治不得其法耳傷寒論曰婦人中風發熱惡寒胸脅下滿如結胸狀譫語者此為熱入血室與此病臨經譫語相同豈非陰血虧而虛火為害哉第時疫乃外邪有虛而有實臨經乃內發有虛而無實彼外入者促景猶謂無犯胃氣及上中二焦況內發者更屬大虛陰血陽氣萬萬不可耗矣初病用逍遙散無後來之變症也救逆仍用逍遙散加棗仁丹參麥冬杜仲之屬舒肝木而益陰血也若誤認風痰食滯為治氣血愈耗不亦犯內經厥逆連臟之旨耶認定熱入血室為主故頭頭是道附案一婦人年二十一庚午夏六月望日胸脅脹痛醫用二陳加延胡川楝香砂黑姜之屬胸脅之痛走入臍上痛矣又進前藥臍上之痛走入少腹痛矣仍進前藥少腹痛減是夜經動不多人事昏沉譫語見鬼延余診視其脈右手細弱左手弦細全不知人事舌常伸出大便不解本家疑為時疫醫家疑為停食莫知所從余曰此肝腎素虛血海有瘀未行致虛火沖逆胞絡而為厥逆之症與時疫經期適來適斷同也法宜補陰血之劑重加當歸以通血室加童便以降虛火兩劑月事大行大便亦下神識清爽霍然愈矣蓋其人前月經期五十日而動乃半產也不慎調攝虛中挾瘀至此月臨經時欲動未動火逆昏迷如有邪祟而庸手不識初藥破氣耗血之誤反謂為食阻為風痰豈不悖哉豈不可畏哉逍遙散見眩暈門陰吹陰吹一症古書不多見惟張長沙金匱要略云胃氣下泄陰吹而正喧此穀氣之實也發煎導之夫陰器屬厥陰部位精竅通衝任之脈尿竅通小腸之路氣道不從此出安得有聲而喧蓋由肝腎虧於下肺氣虧於上致陽明胃氣不能鼓舞上行而虧於中下走陰器直入精竅而出豈同大腸矢氣經謂濁陰出下竅者可比耶嘗見虛損之輩久咳經阻胃氣不升往往多有此患以言乎腎則氣不攝可知以言乎肝則氣不平可知以言乎肺則氣不主可知是以上咳下吹氣竅相通陰器隱隱而有聲足見精血之虧元氣之弱根本搖搖矣夫陽明為多氣多血之海與衝任血海之脈同氣而相應下為經而上為乳變化取汁血氣之實也喧聞戶外胃氣之虛也魏氏云穀氣之實其實胃中正氣之衰斯言極中長沙之秘旨如必謂穀氣實而引導濁氣從大腸出縱胃氣下泄必由濁道而不致干亂清道是錯認溺竅為病也第胃氣下泄前陰之膀胱何異下泄後陰之大腸而終無補於病情豈仲景當日之深意哉且腎主開闔為生氣之原陰器屬肝主疏泄之令今胃氣下走豈尋常之藥可以奏功必須培補肝腎以固肺金生精益血以助真氣若陽分多虧補中歸脾之屬可投陰分多虧六味左歸之屬可用陰陽兩虧八味右歸之屬可服耗氣敗血之藥非其治也倘不咳而竅有聲較咳而竅有聲者為稍輕逍遙六味皆合法也雖然膀胱有下竅而無上口胃氣何由下泄其從精竅而來不待辨而自明男子從無婦人常有無非竅空而妄泄況穀道後通而前陰之吹者有之穀道後秘而前陰不吹者有之穀氣實胃氣安得下泄仲景發煎導引之法其說似屬難明矣即令胃氣從溺竅下泄小便當隨氣而共出何吹時惟有聲而無溺則溺竅而來之說更屬無據要之胃氣者乃水穀之精氣上輸於脾脾氣散精上歸於肺與腎中生氣而互根得毋因其人水穀之真氣衰弱而以脂膏益血之品從陰引陽填補衝任不使氣陷於子宮直走精門未可知也陰吹一症人但知氣從下泄而昧於出自何竅拘泥長沙之文未有暢發其因者先生為之條分縷析可振聾聵非三折肱良手安能搜此精義補中湯見暑症門歸脾湯見中風門六味湯見審虛實門左歸湯見失榮門八味湯見審虛實門逍遙散見眩暈門右歸飲熟地二三錢加至一二兩山藥二錢炒杜仲二錢薑汁炒枸杞子二錢肉桂一二錢川附子一二三錢山萸肉一錢甘草一二錢炙水二鍾煎八分食遠服
