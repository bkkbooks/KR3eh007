body:
  text: 卷上魂魄論朱子云死則謂之魂魄生則謂之精氣天地公其德謂之鬼神魂者陽之神魄者陰之神所謂神者以其主乎形氣也故言魂魄而神即在其中矣人之形骸魄也形骸而能運動亦魄也夢寐變幻魂也聰慧靈通神也分而言之氣足則生魂魂為陽神精足則生魄魄為陰神合而言之精氣交魂魄聚其中藏有真神焉主於心而虛靈不昧聰明知覺者也若精氣衰魂魄弱真神漸昏何也本體常明因氣血衰敗則少生動之機而神無所輔助故本來面目斂矣譬之於燈油與燈草即魄也火即魂也光芒四射即神也油干火暗光芒隱魂之陽神魄之陰神中之真神皆散僅存燈中之草草即死魄耳譬之於爐灰炭即魄也火即魂也火之焰即神也炭燼火熄焰滅魂之陽神魄之陰神中之真神皆散灰即死魄耳人死軀殼存亦死魄而已矣但此真神與天地同休如燈之光爐之焰人以為滅也而不知燈復添油爐復加炭火焰依然是滅者有相而不滅者無相也人死神無軀殼依附魂魄無神依附皆脫出虛空魂魄猶有相空則無主而飛散散則莫知所之矣神則絕無相空亦無主然散而實不散不靈而靈機猶在必借生人之氣血藏之魂魄生而靈機動是與燈中之光爐中之焰無異矣不觀小兒初生亦一魄乎形體未充魄未壯也無夢寐變幻魂未聚也無聰慧靈通神未明也精氣盛魄則壯矣魂則聚矣神則靈矣內經曰精者身之本又曰氣內為實人可不自愛惜哉是以道家以精氣為實借有形氣血而養無形之神釋家以自性不滅是實不以氣血迷吾之性性本空虛無來無去明心即見性吾謂道家著實工夫釋家從空會悟明乎此不第知魂隨神而往來魄並精而出入而生死機關可以心會作佛修仙亦不外是矣魂魄之義自大易有精氣為物遊魂為變之言以後經傳諸儒各有議論發明茲篇前段深合聖賢之理後幅能闡道釋之微審虛實經曰五實死五虛死虛者固難補救而實者亦多喪命醫家詳辨之庶虛實不致混淆而投劑立效矣蓋外感之實邪氣實也實中有真虛正不勝邪邪乘虛而內陷也內傷之虛根本虛也虛中有假實火熱為害灼津液而耗血也如傷寒有虛實矣病在陽者多實病在陰者多虛腹痛有虛實矣痛而拒按者多實痛而喜按者多虛咳嗽有虛實矣鼻塞聲重者多實痰血潮熱者多虛虛實二字乃諸症之大綱舉三者而千萬症之虛實亦瞭然於心目之間也故風寒暑濕燥火之邪或在表或在裡或在腑必有所居而直指之邪之實也若無六淫之邪而為病者則惟情欲以傷內勞倦以傷外非實似實及細審之乃症之虛也實實虛虛安可不明其義耶夫世人之病百不一實而世間之醫百不一補以新病為實似矣而久病亦以為實也以補不效為實似矣而表散不應猶以為實也以外症為實似矣而脈象空虛亦以為實也是實而誤補邪增尚可解救虛而誤攻氣散不可救藥喜攻惡補之弊其何以挽回哉且實症易醫虛症難療真實易認假實難辨設內症寒熱面赤舌乾口苦牙宣鼻衄頭痛心煩大小便不利脈來數大或弦細急數當此之際莫不以芩連知柏之屬清火為先豈知陰不維陽內臟水虧無根之焰不斂病勢危篤明者急投六味湯壯水之主八味湯益火之源俾陰液生而陽火藏精氣回而坎離交庶可有救也設外症壯熱不退口渴不飲煩燥不寧大便不解舌黑如墨小便如血兩脈虛數或沉細而數當此之時莫不以白虎承氣湯為治豈知陰盛隔陽內真寒而外現假熱危在頃刻明者急用附子理中湯或人參八味湯之屬反佐從治俾虛陽斂而陰寒現真元復而外邪退方可得生又有二三候後潮熱肌瘦人倦力怯胸悶少食口渴引飲小便赤澀大便秘結不能起立斯時莫不以病久大虛擬之及診兩脈沉細有力而數明者速進承氣湯一劑大便通而邪解精神旺而火除庶可無虞也不然一七之投誤人不淺書不云乎至虛有盛候大實有羸狀真假之別非診脈之精歷症之熟未易窺其虛實虛者用參耆而安實者用膏連而起視夫以實為虛以虛為實者不啻霄壤之隔矣病有虛實有真假闡發至此可謂發前賢未發之秘附子理中湯人參三錢白朮三錢炒炮姜三錢川附子三錢甘草三錢炙每服八錢水煎服人參八味湯熟地三錢山藥三錢炒茯苓一錢五分人參一錢五分皮丹一錢山萸肉一錢川附子一錢肉桂一錢澤瀉五分承氣湯大黃四兩芒硝二合厚朴半觔枳實五枚上用水一斗先煮厚朴枳實取五升去渣再入大黃煮取二升去渣納芒硝更上微火煮一二沸候溫之得下即止不必盡劑六味湯熟地五錢山藥二錢炒茯苓一錢五分丹皮一錢澤瀉五分山萸肉一錢水二鍾煎七分食遠服八味湯即前六味湯加附子肉桂各五分水二鍾煎七分食遠服知生死今夫氣聚則生氣散則死人生所賴惟此氣也醫寄死生責任最重若平日不能講究精微臨症而吉凶莫辨豈足謂之醫耶經曰陰精所奉其人壽陽精所降其人夭是精能生氣氣能生神古人言之鑿鑿余亦何容嘵嘵第生死機關極難確認新久輕重更難分別即以暴吐而死者先言之平日無恙忽然嘔吐愈吐愈甚點水不入入則反出大汗如雨神識昏憒手足厥冷脈如懸絲此脾胃本虧孤陽離根由胃而上大吐不已胃氣暴絕矣有嘔血鬥余或鮮或瘀傾囊而出冷汗如雨手足如冰元氣暴絕矣有咳血如泉急衝而上內挾血塊其大如拳壅塞喉竅吞之而上送之血又至咯之而結塊之血不出氣道不通真氣暴絕矣有忽然泄瀉晝夜不下數百行飲食入口隨即吐出或已入胃隨即瀉下大汗氣促神色改變兩脈全無脾腎暴絕矣有忽然頭痛漸不可忍目定神昏手足抽掣譫語厥冷脈非沉細如絲即數大無倫此平素精血內虧腎中之虛陽直逆巔頂陽氣暴絕矣有房室之後陰寒乘虛直中小腹急痛不可耐嘔酸苦味喜曲喜按漸致指甲青黑手冷如冰冷汗如雨真陰真陽暴絕矣有忽然卒中五絕皆見腎元敗而陰陽離兩手無脈大汗出而暴絕矣有感受時令二三日間即傳厥少兩經神昏目定抽掣譫語舌黑冷汗正氣為邪所耗陰液灼盡五臟六腑暴絕矣若久病而生者何以見之如咳嗽吐血寒熱等症脈尚未數飲食未減河車丸以進久服不輟加之心靜神藏善於內養或半載或一載陰液漸回諸症漸退久病而生矣腹脹如鼓兩足及面皆浮病在脾腎尚未傳肺而變喘咳惟口渴面赤大便秘脈數大病在陰虧宜壯水之主如手足冷大便瀉脈細遲病在陽虧宜益火之原服藥兩百日不斷兼之養氣吞津久病而生矣痛痹在床手足紅腫叫喊不休食飲減少半載不能步履或滋陰養血或陰陽兩補參地歸杞久久服之痛除腫消久病而生矣三陰瘧疾延纏不已或變陰虛而咳嗽或變陽虛而浮腫壯水益火補脾生血歸地參耆河車鹿茸合宜而用之久病而生矣婦人崩漏淋漓不止日久面黃氣浮手足亦腫腹中亦脹飲食亦少大便亦薄脈息亦細重進參耆多投歸地卻慮靜養久病而生矣以上數條此其大略也神而明之因此可以識彼是在醫者自勉之而已矣雖然醫之而生者病有元氣也醫之而不能生者脈無胃氣也病可醫而終於不能醫者醫伐其氣也人生之所賴惟此氣而已彼精之與神不又即是而可推哉前提後束中分二段生死之機了無遺義河車丸河車一具用甘草煎湯泡洗人參一兩焙研山藥四兩人乳拌蒸曬茯苓三兩人乳拌蒸曬上為末用黑棗十二兩煮爛去皮核搗為丸每早開水下四錢活命湯治暴吐欲絕急以此湯濃煎徐徐飲之隨吐隨飲人參一錢或二三錢炙甘草一錢製附子一錢炮姜一錢加炒陳米一撮水煎服救元飲治嘔血鬥余鮮瘀並出急用此飲白朮二錢土炒人參二錢多加亦可炙甘草一錢五分炮姜一錢五分黃耆三分炙當歸三錢酒炒水煎服生脈散治咳血真氣暴絕急用此飲麥冬三錢五味子五分人參二錢加童便一杯水煎服附子理中湯見審虛實門治忽然泄瀉不下數百行飲食即吐八味地黃湯見中風門治忽然頭痛漸不可忍目定神昏等症六味回陽煎治房室之後陰寒乘虛直中小腹等症熟地三錢人參二錢製附子一錢白朮一錢炒丁香五分水煎服參附救生湯救忽然卒中五絕皆見附子二錢人參三錢炒陳米二錢加姜一片水煎灌之六味參附湯治感受時疫二三日即厥神昏目定等症熟地三錢生地三錢人參一錢當歸二錢甘草一錢附子一錢加稻上露水或荷葉上露水煎服中風竊怪中風一症古法相傳皆謂六淫之邪外風之襲藥投表散清涼如三化續命愈風等湯議論紛紜訓示諄諄後人守定此法以為先賢必不我欺豈料指鹿為馬遵法奉行藥下咽而即斃嗚呼何醫學之不明而人心之愚昧如是耶即一二有識之士以類風辨之以真風目之然類風者猶不離乎風而有似於風真風者則實指為風不能捨六淫之外而又有所謂風也今中風之症其果六淫之風乎哉又謂中風須分閉脫兩種閉則有六經之症脫則有五絕之險夫脫為五絕之險是矣而閉兼六經之症亦不外仲景傷寒之所謂中風脈浮緩自汗出而發熱也今中風之症其果仲景之所謂中風乎哉蓋外風為陽邪其中人也必先皮毛而入決不比陰寒之邪不從陽經而直中三陰之速設中屬外風之說則當入傷寒一門何必於傷寒之外而又立中風之條風邪最輕從無直中傷人之患何中風疾發有頃刻垂絕之危仲景傷寒於中風症脈言之極詳何未聞將中病同發明於傷寒中風之內以此辨之則向之所謂風為真風謂症兼六經者其何說之辭況經謂虛邪偏客身半未嘗雲實營衛衰則真氣去明是云虛其言微知可治甚則不能言不可治從根本而驗生死又何嘗言及外風與六經之形症耶即言及外風者亦不過外感之表邪自有頭痛身痛寒熱之兼症耳明張景岳直闢前人之誤斷以非風之名可謂發千古之未發奈病家卒不知信醫家卒不知從旁人卒不知解有令人讀是書而不禁三嘆者矣夫風自內生屬東方之木氣氣動便是火火動便是風是氣也火也風也分而言之有三者之名合而言之則有一無二之別且風亦不過氣之逆火之熾耳並非氣之外而別有火火之外而別有風也第此火發於腎虛多而實少此風根於氣陰虧而陽弱是以中症之發大約精血內虧元氣內敗者為此症之大旨如虧在陰則虛火無制虧在陽則真氣無根當此之際必有一股虛氣從腎中間上挾脊穿崑崙過泥丸直到命門而三陰三陽之氣突然而散臟腑之氣亦隨之而去此所謂五絕之脫候也若症之輕者乃一半精氣未敗尚可挽回於萬一蘇後必半身不遂經所謂偏枯之症者此也其口眼歪斜者筋無精血榮養也其舌喑不能言者脾腎元虧不能上達舌本也其口流涎沫者脾虧不能攝津液腎虧不能藏津液也其口噤不開者陽明之筋虛火灼而勁急真氣寒而拘攣也治法五絕症見宜用參附湯參朮湯大補元煎之類以救垂絕之危險偏中症見宜用地黃飲子八味生脈湯六君子湯之類以扶余生之歲月脾腎大敗宜用六君子湯四君子湯歸脾湯之類以回中焦之穀氣肝血大虧宜用人參養營湯歸芍地黃湯八味生脈湯之類以生肝木之汁少倘內有燥熱風火相煽亦令人暴厥雖古法有白虎之方然不若壯水補陰為穩蓋火之有餘乃水之不足陽之有餘乃陰之不足也噫中年之後始有是症三旬以前從無是患形體豐肥每遭此禍質弱清癯僅見此厄不亦精血虧真氣衰之明效大驗乎倘庸醫必以外風強辨試問此風何不及於幼少而必及於老壯少及於清癯而多及於豐肥者又將何說以解之耶故臨川陳先生曰治風先治血血勝風自滅旨哉言乎中風之論隨方書所載人云亦云不幾誤乃公事乎本經酌議洗盡謬說方屬上工見解後學遵而行之陽春滿眼矣參附湯人參一兩川附子五錢姜水煎服參朮湯人參二錢白朮二錢炒黃耆二錢炙陳皮一錢白茯苓一錢甘草一錢炙水二鍾煎八分食遠服大補元煎熟地五錢人參三錢山藥二錢枸杞子二錢杜仲二錢當歸二錢甘草一錢炙山萸肉一錢水二鍾煎八分食遠服地黃飲子熟地巴戟肉山萸肉肉蓯蓉酒洗石斛川附子五味子白茯苓石菖蒲肉桂遠志肉麥冬上各等分每服五錢入薄荷少許生薑同大棗煎服八味生脈湯熟地五錢人參一二錢或五七錢麥冬二錢山藥一錢五分山萸肉一錢五分丹皮一錢茯苓一錢肉桂五分澤瀉五分五味子五分川附子五分水二鍾煎七分食遠溫服四君子湯人參二錢白朮二錢炒茯苓二錢甘草二錢炙加薑棗水煎服或加粳米百粒六君子湯即四君加陳皮一錢五分半夏一錢五分或加鍋心焦三錢如前煎服歸脾湯人參二錢白朮二錢炒茯神二錢棗仁二錢黃耆二錢炙當歸一錢遠志一錢木香五分甘草五分炙龍眼肉七枚煎七分食遠服人參養營湯人參一錢白朮一錢炒黃耆一錢炙白芍一錢五分炒當歸一錢陳皮一錢肉桂一錢甘草一錢炙熟地七分茯苓七分遠志五分加薑棗水煎服歸芍地黃湯熟地五錢當歸三錢山藥二錢炒萸肉一錢白芍一錢五分炒茯苓一錢五分丹皮一錢澤瀉五分水二鍾煎七分食遠服三化湯厚朴薑製大黃枳實姜活各等分每服三兩水三升煎至一升終日服以微利即止金匱續命湯治中風肢體不收口不能言冒昧不知痛處拘急不能轉側並治伏不得臥咳逆上氣面目浮腫麻黃去節人參當歸石膏桂枝川芎乾薑甘草各三兩上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出即愈不汗更服無所禁忌勿當風千金大續命湯即前方內去人參加黃芩荊瀝元戎方用竹瀝小績命湯千金通治八風五痹痿厥等疾以一歲為總六經為別春夏加石膏知母黃芩秋冬加官桂附子芍藥又於六經分別藥內隨症細分加減自古名醫不能越此麻黃去節人參去蘆黃芩去腐芍藥甘草炙川芎杏仁去皮尖炒防己官桂各一兩防風一兩五錢附子五錢炮去皮臍上除附子杏仁外為粗末後入二味和勻每服五錢水一盞半加姜五片煎至一盞去渣稍溫食前服愈風湯治中風諸症當服此藥以行通諸經則大風悉去縱有微邪只從此藥加減而治之若初覺風動服此不致倒僕此乃治未病之要藥也羌活甘草防風當歸蔓荊子川芎細辛黃耆地骨皮獨活秦艽黃芩芍藥枳殼人參麻黃白芷甘菊薄荷枸杞子知母各三兩生地黃蒼朮各四兩肉桂一兩上㕮咀每服一兩水二鍾生薑三片煎七分空心臨臥服空心一服吞下二丹丸謂之重劑臨臥一服吞下四白丹謂之輕劑假令一氣之微汗用愈風湯三兩加麻黃一兩作四服加姜七片空心服以粥投之得微汗則佳便不通利用愈風湯三兩加大黃一兩亦作四服每服加生薑五七片臨臥煎服得利為度景岳曰中風一症病在血分多屬肝經肝主風水故名中風奈何自唐宋名家以來竟以風字看重遂多用表散之藥不知凡病此者悉由內傷本無外感既無外感而治以發散是速其危耳若因其氣血留滯而少佐辛溫以通行經絡則可若認風邪而必用取汗以發散則不可倘其中亦或有兼表邪而病者則諸方亦不可廢錄之亦以存古人之法耳偏中偏風一症名曰類中類中者有類於風而實非風也譬如樹木一邊葉枯則不能灌溉而欣欣向榮人身之四末亦猶是也經曰虛邪偏客於身半其入深者內居營衛營衛衰則真氣去邪氣獨留發為偏枯可見內經謂邪為虛邪而非外襲之風也明矣蓋肝腎精虧經脈失榮血不運行氣不貫通氣血兩虛不仁不用是以脈中脈外皆少生動之機或左或右無非氣血之敗善醫者補腎生肝掌得血而能握足得血而能步矣填實下元腎氣回而經脈通上達舌本語不蹇澀矣益氣生精筋脈得血滋養而營衛之氣不失常度口無歪斜矣培補脾土為胃行其津液灌溉四藏口涎收攝矣夫肝邪之為害實由肝血之虧虛血虛則燥氣生而木從金化風必隨之血虛則火性烈而津為熱灼痰自生焉治此者當養血以除燥則真陰復而假風自滅補水以制火則腎氣充而虛痰自化補陽以生陰則元陽回而水泛自消風痰之藥不可用斷斷如也設也誤認內生之風為外入之風而竟以外風之藥進之則枯者益枯誤認內生之痰非津化為痰而竟以攻痰之藥進之則虧者愈虧誠如是也則一邊之廢已離恃其無虞而耗氣敗血勢必龍火無制從命門丹田之間直衝髓海斯時五絕見而人事昏大汗出而元神散群醫皆曰此復中也不可救也藥之誤也真可畏也噫晚矣透發內經營衛衰則真氣去之旨足以昭示來茲補腎生肝飲治肝腎精虧經脈失榮血不運行氣不貫通氣血兩虛不仁不用當歸二錢熟地三錢白芍二錢炒女貞子二錢山藥一錢五分炒人參一錢枸杞子一錢五分丹參一錢炙甘草一錢水二鍾煎七分食遠溫服眩暈眩暈一症有虛運火運痰運之不同治失其要鮮不誤人醫家能審脈辨症細心體會斯病無遁情而藥投有驗矣曷言乎虛運也如縱欲無節而傷陰脫血過多而傷陰癰膿大潰而傷陰崩淋產後而傷陰金石破傷失血痛極而傷陰老年精衰勞倦日積而傷陰大醉之後濕熱相乘而傷陰其症面赤耳熱口乾不渴煩躁不寐寒熱往來大便秘而小便赤其脈或弦細而數或弦大而數或細澀而數無非精血受虧陰虛為病蓋蒂固則真水閉藏根搖則上虛眩僕此陰虛之運也如勞倦費神而傷陽嘔吐過甚而傷陽泄瀉無度而傷陽大汗如雨而傷陽悲哀痛楚大呼大叫而傷陽其症面色青慘神倦氣乏畏寒厥冷身面浮氣大便泄而小便清其脈或沉細而微或弦細而遲或浮大而空無非元陽被耗氣虛為病蓋稟厚則真火歸臟臟虧則氣逆上奔此陽虛之運也治陰虛者用六味歸芍湯加人參之類壯水之主以生精血治陽虧者用八味養血湯加人參之類益火之源以生元氣所謂滋苗者必灌其根也曷言乎火運也如房勞則火起於腎暴怒則火起於肝思慮則火起於脾兩耳磬鳴兩目昏黑上重下輕眩僕卒倒脈象細弱無非動亂勞擾虛火為用蓋火藏則清明內持動擾則掉搖散亂此虛火之運也若實火眩暈者其人必強健其症必暴發其渴必引飲其脈必洪數其嘔酸苦水之味運稍定其飲食寒冷之物運稍緩其大便燥結解後運稍止無非風火相搏實熱為害蓋有餘則上盛而火炎壅塞則火熾而旋轉此實火之運也治虛火者宜六味湯逍遙散之屬滋陰以制火舒肝以養脾治實火者宜三黃湯竹葉石膏湯之屬清降以抑火辛涼以瀉熱所謂虛火可補實火可瀉也曷言乎痰運也如水沸水泛則痰起於腎風火生涎則痰起於肝濕飲不行則痰起於脾頭重眼花腦轉眩冒倦怠嗜臥食飲不甘脈象緩滑無非疲勞過度虛痰為虛蓋清升則濁陰下走氣滯則津液不行此虛痰之運也若實痰眩暈者其症實而脈實其積熱在陽明其阻塞在經絡其鬱遏在腸間無非風火結聚積痰生災蓋液凝則濁陰泛上飲停則火逆上升此實痰之運也治虛痰者宜六味八味歸脾之屬補脾腎之原治痰之本治實痰者宜二陳湯加芩連滾痰丸之屬逐腸胃之熱治痰之標所謂實實虛虛補不足而損有餘也大抵虛運者十之六七兼痰火者十之二三即傷寒眩暈雖有表散之法亦多因汗吐下後虛其上焦元氣所致且今人氣稟薄弱酒色不謹肝腎虧而內傷劇致眩暈大作望其容則精神昏倦也聞其聲則語言低微也察其症則自汗喘促也切其脈則懸懸如絲也當此之時須執一定之見毋惑多歧之臆說惟投參耆朮附重劑多進庶可轉危為安倘病家畏驟補而生疑醫家見驟補而妄駁旁人因驟補而物議以虛症為實火以參耆為砒毒點滴不嘗卒中之變至危脫之象現雖有智者亦無如之何矣豈不惜哉大呼大應發明脈因症治之理條分縷析而又結出望聞問切之情法精辭暢氣象沉雄直逼西漢大家六味歸芍湯見中風門八味養血湯熟地五錢當歸三錢山藥二錢炒肉桂五分茯苓一錢五分白芍一錢五分炒附子五分丹皮一錢澤瀉五分山萸肉一錢水二鍾煎七分食遠服四君子湯見中風門八味生脈湯見中風門逍遙散柴胡當歸白芍炒白朮炒茯苓甘草各等分上加生薑水煎服六味湯見審虛實門三黃湯黃連黃柏黃芩各等分水二鍾煎七分食遠溫服竹葉石膏湯石膏一兩人參三錢麥冬三錢半夏二錢甘草二錢竹葉二十片粳米一撮此係今方分兩非仲景舊法水二鍾姜三片煎服歸脾湯見中風門八味湯熟地五錢山藥二錢炒茯苓一錢五分丹皮一錢澤瀉五分山萸肉一錢附子五分肉桂五分水二鍾煎七分食遠服二陳湯茯苓三錢陳皮三錢半夏三錢甘草一錢上加姜三片水煎服滾痰丸青礞石硝煅金色一兩大黃酒蒸黃芩各八兩沉香五錢上為細末滴水為丸如梧桐子大每服三五十丸量人強弱加減補肝養榮湯治亡血血虛眩暈心煩如坐舟車舉頭欲倒當歸川芎各三分白芍炒熟地橘皮各一錢五分菊花一錢甘草五分水煎服益氣補腎湯治色欲傷腎氣逆不能歸元眩暈耳鳴耳聾人參黃耆各一錢二分蜜炙白朮二錢土炒白茯苓一錢炙甘草五分山藥炒山萸肉各一錢五分加姜水煎羚羊角散治一切頭眩羚羊角茯神各二錢五分川芎防風白芷半夏湯洗各五錢枳殼附子各二錢五分共為細末每服四錢水一鍾慢火煎七分溫服燥症燥症何自而起哉有外因者六淫之一也有內因者血液之枯也醫家往往誤治不辨脈之虛實症之新久體之強弱概以燥病為外邪而藥投清涼剝削無怪乎操刃殺人者矣夫外因之燥非雨露愆期即秋日暴烈非南方不毛即北方風勁氣偏陽亢而燥生大約氣從皮毛而入者則肺受之肺受燥氣咳嗽咽痛之症見矣從口而入者則胃受之胃受燥氣結胸便秘之症見矣明喻嘉言謂秋傷於燥冬生咳嗽議論發前人之未發而清燥一方創自己意可為治燥之靈丹至於結胸便秘世俗多以傷寒混治不知燥則生火津液耗而腸胃干大小陷胸之法利於體實而不利於體虛者也可不慎歟若內傷之燥本於腎水之虧精血之弱真陰之涸在肺則清肅之令不行咳逆口渴皮聚毛落矣在肝則將軍之性不斂脅痛暴怒筋急拘攣矣在脾則生血之原不運蓄瘀便結皮膚不澤矣欲治其燥先貴乎潤欲救其脾先滋乎腎誠以腎主水而藏五臟六腑之精養百骸而為性命之本若腎陰足而及於肺水道可以通調腎陰足而及於肝木氣可以向榮腎陰足而及於脾四及可以灌溉燥無自而生也第水日虧而火日熾決非清涼之味所可療必須重用六味歸芍湯合生脈散為主治肺燥則加沙參天冬梨汁之屬肝燥則加丹參棗仁乳汁之屬脾燥則加柏子仁松子仁甘蔗汁之屬此燥病之正治也倘久病而氣因精虛參耆河車及八味等湯亦宜急投蓋陰生則陰長氣化則血潤此燥病之反治也雖然草木之枯得雨滋榮人身之燥非血不澤參乳湯救燥病之根活命飲治燥病之原又何必紛紛而他求耶經不云乎諸澀枯涸幹勁皴揭皆屬於燥又曰燥勝則乾其為血液之涸已明效大驗如膈病之枯胃之燥也消病之渴肺之燥也爪甲之焦筋之燥也產後之痙血之燥也而敢謂治燥症為易易哉庸醫必以此症為實不惟清涼藥進而反以燥藥治燥病不亦犯內經剛與剛陽氣破散陰乃消亡之旨乎燥則當潤經義如是得其肯綮治燥之效有不捷於影響乎清燥湯桑葉經霜者三錢石膏煅二錢五分胡麻仁一錢炒研甘草一錢阿膠八分人參七分麥冬七分杏仁去皮尖炒黃七分枇杷葉去毛蜜炙一片上九味以水一碗煎六分頻頻二三次滾熱服之六味歸芍湯見中風門八味湯見審虛實門生脈散見知生死門參乳湯人參一錢人乳一杯不拘時服活命飲人參二錢鍋焦一兩水煎和參湯服滋燥養榮湯治外燥皮膚皴揭筋爪枯焦當歸三錢熟地二錢白芍一錢炒秦艽一錢黃耆一錢防風八分甘草五分水煎服肝血虛則風熱而金燥故令皮膚皴揭而筋燥爪枯也以當歸芍地滋潤榮血而以艽防參草消風燥活血潤燥生津飲治內燥津液枯少當歸一錢白芍一錢炒熟地一錢天冬八分麥冬八分栝蔞根八分桃仁八分爛研如泥紅花五分水煎服燥者血液少而生也歸芍地黃沉陰可以養血栝蔞二冬甘寒可以生津桃仁紅花滋濡可以潤燥濕症濕之為病有外因內因之不同有濕熱寒濕之各別苟不辨表裡察虛實而求本施治未有不誤人於反掌間者矣如外因之濕也有感天地之氣者則雨露水土之屬有中陰濕之氣者則臥地濕衣之屬多傷人皮肉筋脈者也內因之濕也有由於飲食者則酒酪炙煿之屬有由於停積者則生冷瓜果之屬多傷人臟腑腸胃者也其見症也在肌表則為發熱為惡寒為自汗在經絡則為痹為重為筋骨疼痛為腰痛不能轉側為四肢痿弱痠痛在肌肉則為麻木為胕腫為黃疸為按肉如泥不起在臟腑則為嘔惡為脹滿為小水秘澀為黃赤為大便泄瀉為後重㿗疝等症然在外者為輕在內者為重及其甚也則未有表濕而不連臟者里濕而不連經者此濕病之變不為不多也況濕從內生多由氣血之虛水不化氣陰不從陽而然即濕從外入亦由邪之所湊其氣必虛之故若泥於治濕不利小便非其治之旨而概以濕為實症豈不誤施而犯虛虛之戒耶夫濕從土化而分旺四季故土近東南則火土合氣而濕以化熱如脈滑數小便赤澀大便秘結引飲自汗者方是熱症治法宜清宜利四苓散大小分清飲茵陳飲之類主之土近西北則水土合德而濕以化寒如脈細遲小便清白大便泄利身痛無汗者方是寒症治法宜溫宜燥五苓散理中湯金匱腎氣湯之類主之大抵濕中有火則濕熱薰蒸而停郁為熱濕中無火則濕氣不化而流聚為寒且內濕之症屬陰虛者因濕生熱而陰愈虛陰虛則精血內耗而濕熱反羈留而不動屬陽虛者因濕化寒而陽愈虛腸虛則真火內敗而寒濕更積蓄而不消是以醫家察脈而確知其為陰虛生濕也須用壯水補陰之品則真水運行而邪濕必無所容察脈而確知其為陽虛生濕也須用益火補陽之藥則陽氣流通陰濕不攻而自走可見內傷外感之症皆由元氣虛弱致濕邪內而發之外而襲之經曰壯者氣行則已怯者著而為病彼妄行攻擊喜投推蕩者安可不兢兢自慎哉蓋脾元健運則散精於肺而膚腠堅固外濕無由而入也腎氣充實則陰陽調和而升降有度內濕何自而生乎不然者徒知表汗燥濕利二便之法而不惜人元氣將見腫脹泄瀉之症變而議論更多臆說矣開鬼門潔淨府人以為確守經義而不顧元氣宜其人甚多而濕病之根難拔先生卓見自不雷同四苓散澤瀉一兩七錢五分豬苓茯苓白朮炒各七錢五分古法為末今法以水煎服五苓散即前方減澤瀉五錢加肉桂五錢古法為細末每服二錢白湯調下今法以水煎服大分清飲梔子炒焦豬苓各四錢茯苓澤瀉木通各二錢枳殼一錢車前子一錢水一鍾半煎七八分食遠溫服小分清飲茯苓三錢澤瀉二錢苡仁二錢豬苓二錢枳殼一錢厚朴一錢水鍾半煎八分食遠服茵陳飲茵陳梔子焦澤瀉青皮各三錢甘草一錢甘菊花二錢用水三四鍾煎二鍾不時陸續飲之理中湯人參白朮炒炮姜甘草炙各一錢五分水煎服金匱腎氣湯熟地三錢茯苓一錢五分山藥一錢牛膝一錢山萸肉一錢車前子一錢丹皮八分澤瀉五分附子五分肉桂五分水煎溫服頭痛頭痛一症病家視其微疾而輕忽之醫家盡認傷寒而妄治之藥投而病漸增病增而藥愈亂束手無策待斃莫救此辨之不可不早也夫經言外感有頭痛內傷亦有頭痛豈容混治而無所區別第外感頭痛有痛在陽經有痛在陰經如太陽陽明少陽頭痛屬陽經厥陰頭痛屬陰經然其初發必寒熱其背必痠痛其項必強痛其目珠額前痛其耳聾兩脅痛其脈必緊數其厥陰無身熱嘔而吐沫若素無頭痛之患而忽然暴發痛兼表症痛亦隱穩及按之摩之縛束之而痛不定者乃外感之頭痛治在風池風府調其陰陽汗在表而散在巔清在陽而溫在陰也內傷頭痛有痛在陰虛有痛在陽虛如火升巔頂作痛者必煩躁內熱面赤口渴大便秘結其脈必大數而空或細數而弦屬陰虛如寒沖髓海作痛者必羞明畏寒手足厥冷面多青慘大便溏泄其脈必細遲而微或虛大無力屬陽虛然其初發無寒熱無急痛不可忍其精神必倦怠其飲食必不甘若素有頭痛之患忽然暴發痛無表症陰分痛甚及按之摩之縛束之而痛稍緩者乃內傷之頭痛治在水火二臟調其營衛補真陰而益元陽病在上而治在下也夫六腑清陽之氣五臟精華之血皆會於頭為至清至高之處故為天象謂之元首至尊而不可犯者也凡手之三陽從手走頭足之三陽從頭走足以為常度則無頭痛之患苟外因風寒霧露之觸內因痰火濕熱之薰及偏正頭風之症雖痛不見殺人於數日之間而殺人於數日之間者則為內傷之真頭痛也蓋腦為神藏謂之泥丸宮而精髓藏焉人生精氣實於下則髓海滿於上精神內守病安從來無如以酒為漿以妄為常醉以入房以欲竭其精以耗散其真致腎氣不充而髓海空虛腎陰不足而陰火沖逆腎陽不壯而寒氣通腦醫者不達其故復投羌防辛芷之屬溫之散之夫既虧在陰矣我又從而溫之不益虧其真陰乎既虧在陽矣我又從而散之不愈虧其真陽乎無怪乎變症蜂起痛極而厥吾見神為之昏目為之定牙為之噤舌為之黑面為之戴陽手足為之抽掣語言為之譫妄斯時真知其虧在陰也則用六味歸芍湯加人參童便之屬壯水之主以鎮陽光真知其虧在陽也則用八味養血湯加人參鹿茸之屬益火之原以消陰翳此症尤惟婦人血海空虛者多有此患安可不法內經精則養神柔則養筋之旨而以補元為汲汲耶奈何庸碌之輩不明肝腎為髓海之原精氣為神藏之根一見頭痛概以傷寒目之濕熱疑之食滯謂之人事清則日病在傷寒三陽經人事昏則日病在傷寒厥陰經及至病勢危篤險症疊見醫者尚引傷寒書需待用藥不知病者竟以頭痛劇而頃刻亡醫術不精誤人性命有令人不寒而慄者矣夫痛在經者輕而易治痛在臟者重而難療若頭風而害目者肝陰虧則內風動搖邪害空竅痛在經也頭痛而昏憒者腦藏傷則神志失守心火不寧痛在臟也頭痛而痰厥者陽虛則氣寒而飲聚陰虛則火熾而液凝經脈不行陰陽之氣不相順接也頭痛而積熱在陽明實火實痰為瘧脈洪數大而有力者則又利於清涼攻下也頭痛而紅腫壯熱口渴脈浮數而有力者此大頭天行時熱之邪宜從疫法治也頭痛而手足寒且青至節脈懸懸欲絕者此危脫之症旦發夕死夕發旦亡不及藥治藥亦不能治也予因閱歷頭痛之害病家之愚醫藥之誤傷人之速故作是篇敢謂後學之準繩亦令其觸目警心不敢以人命為兒戲耳頭痛一症諸說紛紛皆擇焉而不精語焉而不詳得此暢論至言而群言可廢六味歸芍湯見中風門八味養血湯見眩暈門貞元飲熟地五錢當歸三錢炙甘草一錢水二鍾煎服定痛明目飲治頭痛目生翳膜紅腫如破生地五錢龜版三錢當歸三錢白芍一錢五分炒石斛一錢丹皮一錢菊花一錢夏枯草一錢羚羊角水磨衝入加桑葉五片煎好童便一杯衝入救元補髓湯治頭痛昏憒心主不明則十二官危此方救之熟地五錢人參三錢當歸三錢紫河車一錢茯苓一錢麥冬一錢五分棗仁一錢五分炒研熟附五分鹿茸一錢五味子七粒加桂圓肉五枚水二鍾煎服醒迷湯治頭痛厥逆痰聚胞絡目定口噤手足冷過肘膝陽氣虛寒者宜之人參三錢白朮二錢土炒當歸三錢茯苓一錢白芍一錢炒半夏一錢杜仲二錢炒陳皮八分棗仁一錢炒研炙甘草八分川附子五分加大棗三枚煨姜三片水二鍾煎服普濟消毒飲治大頭天行紅腫壯熱口渴脈有力等症此方主之黃芩五分酒炒黃連一錢酒炒人參一錢橘紅五分元參五分生甘草一錢桔梗一錢鼠黏子八分炒柴胡五分薄荷葉六分連翹八分板藍根五分馬勃五分升麻七分白殭蠶七分炒上為細末半用湯調時時服之半用蜜丸噙化服盡良愈或加防風川芎當歸薄荷細辛水二鍾煎一鍾食遠稍溫服如大便鞕加酒蒸大黃一二錢以利之或熱腫甚者以砭針刺出其血心悟云體虛加人參五分又云此症須用貝母人中黃荷葉為妙發頤症倍柴胡丹皮喉嚨腫痛倍桔梗甘草既濟豁痰湯治頭痛厥逆痰聚胞絡目定口噤手足冷不過肘膝陰虛有火者宜之生地三錢白芍一錢炒茯神三錢鉤藤三錢丹皮一錢五分當歸二錢柏子仁二錢棗仁二錢炒研龜版四錢竹瀝十匙水二鍾煎服暑症今夫夏日烈烈為太陽之亢氣人觸之者則生暑病然有靜而得之者為陰暑動而得之者為陽暑症各不同治法迥別非古法香薷飲一方可以盡之也陰暑症富貴安逸之人多有之因畏暑而貪涼食瓜果而傷臟也身貪涼者內空虛而外寒乘之食瓜果者脾胃寒而吐利作焉其症不壯熱其口不渴飲其脈或細弱或虛大為辨即脈虛身熱為傷暑者是也陽暑症藜藿勞苦之人多有之因受暑而中熱熱傷真陰其症頭痛大熱口渴大汗其脈或洪大有力或洪數有力為辨即因於暑體若燔炭汗出而散者是也陰暑者宜溫補補中益氣湯生脈散之屬陽暑宜清熱六一散之屬受熱而體虛者六味湯之屬為合法也蓋暑熱傷氣益氣而暑自消暑熱傷陰益陰而暑自退值此陽氣外泄之時毛竅疏通暑氣易入不救本源而從事於攻邪真不明邪之所湊其氣必虛之旨耳陰暑陽暑辨別極清益氣益陰治法尤妙補中益氣湯黃耆炙一錢五分人參一錢五分甘草炙一錢五分當歸一錢白朮一錢五分炒陳皮五分升麻三分柴胡三分加薑棗水煎服生脈散見知生死門六一散滑石水飛細六兩甘草一兩共為細末每用五錢新汲水調服六味湯見審虛實門八味湯見審虛實門香薷飲治一切暑熱腹痛或霍亂吐利心煩等症按此方惟治陽暑陰暑不用香薷一斤厚朴姜水炒白扁豆各半斤炒每服五錢水一鍾半煎八分不拘時溫服五物香薷飲治一切暑毒腹痛霍亂吐瀉或頭痛昏憒等症香薷茯苓白扁豆炒厚朴薑汁炒炙甘草各一兩上為咀㕮水一鍾半煎服本方加黃連即名黃連香薷飲十味香薷飲治伏暑身體倦怠神昏頭重吐瀉等症香薷二錢人參黃耆蜜炙白朮土炒茯苓陳皮厚朴薑汁炒白扁豆各一錢炒木瓜炙甘草各五分水一鍾煎七分食遠服喘症喘者息促氣急不能平臥也外感邪入而為喘屬肺受風寒其來暴其脈實其人強壯數日之間忽然壅氣喘咳不得平臥者是也如近日哮病居多乃肺金一經受病藥宜甘梗湯加減此屬實喘也若內傷無外邪中入乃肺腎受病作喘其來漸其脈虛其人倦怠或因病後或因咳久而喘促漸甚不得平臥者是也如近日大富羸病乃腎元虧損腎氣不納而上出於肺肺為門戶而主氣腎氣上衝肺不能主出多入少又肺葉脹大不能收斂臥則葉向脊上阻塞氣道之路喘咳更甚矣此屬虛喘也治宜大補肺腎之原第內傷之喘有陰虛陽虛之異如面赤口渴大便秘屬陰虛如面㿠白口不渴大便泄手足冷屬陽虛陰虛者六味地黃湯加減如麥冬沙參苡仁玉竹阿膠童便之屬皆為合法陽虛者八味地黃湯加減如人參紫河車枸杞子菟絲子杜仲鹿角膠之屬皆為合法也然陰虛作喘而補陰是矣第陰中有陽服六味湯多劑不應則又加人參枸杞子菟絲子杜仲河車之屬取陰陽互根之義也陽虛作喘而補陽是矣第陽中有陰服八味湯多劑不應則又加沙參麥冬玉竹童便之屬取陰陽相濟之義也治病貴乎貫通聞一知十神而明之存乎其人矣陰陽互根相濟之義發喘症未發之蘊甘桔湯桔梗四錢甘草二錢水二鍾煎八分食後服六味湯見審虛實門八味湯見審虛實門咳嗽咳嗽一症有外感內傷之分有陰陽虛實之別醫家症脈不察混治誤人而概以表散風寒之說盡咳嗽之治法合病家之意見者比比皆是也豈不有愧司命之責乎夫外感之咳因偶受風寒由皮毛而入肺其症或頭痛而身痛或惡寒而發熱或鼻塞而聲重或鼻涕而氣急其脈或浮大而緊或弦大而數及素無積勞虛咳之症而忽病咳不已者即外感之症也治法宜用甘梗湯升發肺氣使邪從外達疏通肌腠使熱從表散此治外感咳嗽之法也第人生氣稟薄弱者居多腎水不足者居半肌表空虛風邪易入醫家不明邪之所湊其氣必虛之理非投麻桂羌芷即用細辛荊防嘗謂人曰肺欲辛以辛瀉之此內經之旨也閉門留寇寇欲出而無路致穿窬而走此醫家之忌也於是堅執逐寇之法久進表汗之劑不知肺屬嬌臟又屬燥金升提則傷氣辛香則耗液咳血漸熱之症見而往往症變虛損者多矣故余治外感初咳先用甘桔湯數劑即進六味湯加減壯腎水以清肺熱補正氣以退客邪屢用屢效萬舉萬當非故與俗見相反而嗜好滋補亦為生人之性命起見耳內傷之咳凡肝腎陰虛於下而木火刑金者其症或灑寒而潮熱或形瘦而容減或痰多而帶血或氣短而喉干其脈或弦大而空或弦細而數及素有酒色勞傷之患而漸致咳嗽日增者即內傷勞損陰虧之症也治法宜六味湯補陰斂陽使肺氣充實補水保元使虛火歸根此治陰虧咳嗽之法也又有元陽下虧而水冷金寒者其症或畏寒而喘促或嘔惡而泄瀉或水泛而痰冷或腹脹而食減其脈或細澀而微或浮大而遲及素有下元虛寒之患而漸致咳嗽日甚者即內傷陽虧勞損之症也治法宜八味湯溫補真元使生氣上布填助真火使陰寒冰消此治陽虧咳嗽之法也且內傷之咳不獨肺金為病也經謂腎脈從腎上貫肝膈入肺中循喉嚨達舌本所以肺金之虛多由腎水之涸而腎與肺又屬子母之臟呼吸相應金水相生苟陰損於下陽孤於上肺苦於燥不咳不已是咳雖在肺而根實在腎也司命者其可不兢兢耶奈何近日庸工每遇內傷之咳惟投清金之藥以為穩當及變症百出始委之莫救蓋不知肺受他人之侮我又從而侮之肺金豈順王道之化乎是以治咳而咳愈甚矣雖然更有說焉脾為倉廩之官後天之本散精於肺有生金之能灌溉四旁有益肺之力若久咳而滋補無功必須培養脾元補母以及其子先賢有言補腎不如補脾誠深知肺屬辛金生於巳土而歸脾四君之屬所宜急進也總之外感之咳實中亦有虛宜寓攻於補內內傷之咳虛中或挾實宜補水兼清外感之咳脈數易治邪退則脈靜內傷之咳脈數難治愈虛則愈數至於疫後咳嗽熱傷真陰也瘧痢咳嗽脾胃虧虛也肺癰咳嗽風寒外襲積熱內發而蓄有膿血也肺痿咳嗽金氣外泄肺臟內損病劇衰靡也瘡閉咳嗽皮毛之毒內攻肺臟肺受毒害也支飲咳嗽脾胃生痰肺失治節而清肅不行也脹滿咳嗽土不制水浸潰入肺而關門不利也哮喘咳嗽內有夙根痰塞肺竅而太陰屢困也乾咳無痰氣不生精精不化氣而津液枯涸也種種咳嗽之症多端調治之法各異而察色按脈分別施治者尤必以補元氣為上策也嗟夫內外之咳無非金燥生癢虛實有辨豈容混亂而誤施有內經咳嗽論在學者其可不盡心會悟乎哉今日治咳嗽者在外感亦僅得其半孰知肺腎相關己土生金之理惟此能闡明其奧甘桔湯見喘症門六味湯八味湯見審虛實門歸脾湯四君子湯見中風門時氣咳嗽今夫天之雜氣有各種人之感受有重輕其來也無時其著也無方有觸之者各隨其氣而為諸病焉如秋冬之交咳嗽一症遍於四方延門合戶眾人相同者此皆時行之氣即雜氣為病也其初起惡寒發熱咳嗽咽乾鼻塞聲重頭痛身痛脈浮而數或細而數醫家守五運六氣之說謂此症為風寒所中而用藥多不效是亦不明氣之所至無時所著無方而混施誤人也豈知寒熱之候乃雜氣中之一種較厲氣疫病為稍輕認症不確而治不合法病安有不轉輕為重者哉蓋肺屬太陰居高位而金體本燥通腎氣而子母相生惟腎陰素虧之輩肺藏陰液必虛堅剛之體更多燥氣加以秋冬令節雨澤愆期天之燥氣生而外入肺之燥氣動而內發兩相感召熱則風生肺金畏火內則咳嗽之症見肺主皮毛外則寒熱之候作矣治法甘桔湯加何首烏玉竹貝母黑豆枇杷葉麥冬桑葉丹皮地骨皮梨汁之屬清肺熱而潤肺燥俾外入之燥氣自解內發之燥氣自平若不明寒熱咳嗽之由混投辛溫發散之藥將見肺愈燥而愈咳肺愈咳而愈喘是所謂火上添油者矣如進前藥不應則用六味湯除山萸加麥冬沙參童便梨汁之屬壯水保金益陰退熱無不立效如體素陽虛則用六味湯加枸杞杜仲炙甘草胡桃肉之屬甘潤養陰甘溫養陽方為兩全倘素有咳血之患哮咳之疾及產後老人病人而忽感此症表散妄用則無有不喪命者也嘉言喻氏謂秋傷於燥上逆而咳發為痿厥燥病之要一言而終只以誤傳燥病為傷濕而解者競以燥病為濕病遂至經旨不明今一以論之而燥病之機了無余義真獨開門戶破千古之潰潰矣夫天之燥氣入肺金傷而受火刑化剛為柔燥極生癢不咳不已如以燥治燥恬於操刃曾不顧陰氣消亡之旨耶內經曰秋傷於燥冬生咳嗽又曰必先歲氣毋伐天和司命者其可不知天時人事之理而徒泥於辛甘發散之法竟禍人於反掌間哉言言是理字字是法軒岐復生不過是矣藏之金匱可也甘桔湯見喘症門六味湯見審虛實門吐血血也者總統於心藏受於肝生化於脾宣布於肺施泄於腎為七竅之靈為四肢之用為筋骨之柔和為肌肉之豐盛滋養五臟而神魂得以安充實皮膚而顏色得以潤調和營衛而津液得以運行二陰得以通暢凡形質所在無非以血為用是一身百骸表裡之屬惟賴此血以為生人立命之根者也夫血屬陰精本純靜而不動必隨氣之轉動而血亦運行而不息如日月之麗天而無所阻礙如江河之行地而無所壅塞所謂氣如橐龠血如波瀾營行脈中衛行脈外陰陽和而水火藏安有陽絡受傷血從外溢之理哉奈何膏粱之人暴怒而傷肝陰憂思而傷心脾酒熱而傷腸胃陰血無不受虧惟色欲過度損傷腎氣者為最劇當此之時真陽失守於陰分而無根虛火浮泛於上致營行遲而衛行疾營血為衛氣所迫而上逆肺竅臟傷而血妄動咳血咯血唾血之候見矣即胃火熾盛而血大吐乃陽明之本病固不待言至若怒氣上逆而嘔血者肝木之邪乘胃也欲火上炎而嘔血者火發原泉陰邪之乘胃也由此觀之凡五志之火皆能及胃而奔迫上衝直出咽竅腑傷而血妄溢或暴吐而色鮮或暴脫而色黯矣蓋血出喉竅逆行氣道病雖在上而根在下病雖在肺而源在腎故趙氏謂咳嗽咯唾之血皆少陰之火上奔以子母相顧金水相生呼吸相應者而盡屬腎病也若血出咽竅雖屬多氣多血之海較臟血上溢而殺人之烈者為稍輕然氣血由此而虧營氣由此而耗穀氣由此而減其能免虛虛之禍乎是以醫家當審病情輕重凡偶有所傷而根本未搖者輕而易治內有所損而症劇脈數者重而難療如肝腎陰虛或為咯血或為咳血或為唾血而脈靜芤大或細弱微弦惟用甘醇補陰培養絡脈使營氣漸回而陰火歸根如血久咳逆陰虧已甚而脈急浮大或弦細緊數雖投壯水益陰培補肺腎奈真元已敗而臟損無救如咯血過多驟傷真陰龍火不歸宅窟斯時脈則微細無神症則自汗喘促聲則語言低微此危急虛脫之險症大進參地鹿茸附子童便之屬回元氣於無何有之鄉救真陽於將斷絕之時所謂引火歸原逆者從治或冀回生於萬一也如陽明積熱吐血成塊有火證火脈可據治宜清火而血自安犀角地黃湯主之如怒動肝火載血上逆從胃而吐者治宜平肝而血自安加味逍遙散主之如勞傷心脾血走空竅從胃而吐出者治宜救本而血自安歸脾湯主之如飲灑過多脾胃受傷而血從胃出者葛花解酲湯主之如欲念妄動腎火沖逆於胃而血從胃出者治宜壯水而血自安六味地黃湯主之如陽虛陰走胃中脫瘀陰分受虧者宜補精以化氣正元飲主之陽分受虧者宜補氣以生精八味生脈湯主之又嘗見暴吐失血來如湧泉垂危於頃刻者速以補氣為主蓋有形之血不能驟生無形之氣所宜急固但使氣不盡脫則命猶可保血漸可生須用人參二兩為末加飛羅面錢許調服此正血脈益氣陽生陰長之法也大抵上逆之血宜補水以制火而寒涼不可輕投宜補陽以生陰而反治多有奇效且土為萬物之母有生化精血之能胃為五臟之本有灌溉一身之力古人有言一切血症須以四君胃藥收功蓋深知陰血生於陽氣而脾土健運則中焦取汁變化為赤司命者其可不惓惓於東垣脾胃論而加之意哉失血之人非有大損於臟腑則血不易以至斷未有真陰足而血妄動者亦未有元氣充而血不攝者惟深明陰陽之理議論自突過前賢犀角地黃湯生地白芍炒丹皮犀角鎊末極細各一錢五分上將上三味水煎去渣入犀角末服加味逍遙散當歸一錢白芍一錢茯苓一錢柴胡一錢丹皮五分梔子薑汁炒黑五分甘草五分炙上加生薑三片水煎服歸脾湯見中風門葛花解酲湯葛花一錢豆蔻一錢砂仁一錢青皮六分白朮四分炒神麯四分炒乾薑四分人參三分陳皮三分茯苓三分豬苓三分澤瀉四分木香三分水二鍾煎一鍾服六味地黃湯見審虛實門正元飲熟地七八錢甚者一二兩當歸三錢甘草二錢炙水二鍾煎八分溫服八味生脈湯四君子湯俱見中風門肺癰肺癰為病始萌之時最易惑人極難識認醫家誤作風寒見咳治咳用藥不應及醞釀成膿傾囊吐出方知肺內生癰已為棘手之候是亦未嘗察脈辨症而竟以人命為草菅者也蓋肺屬西方之位為五臟之華蓋內司呼吸外充皮毛其色白其時秋肺金獨旺於秋者應其輕清之候也倘有所克其病自生故患肺癰者或因腠理不密外邪所乘而內感於肺或因菸酒炙爆內蘊積熱而薰蒸於肺其症惡寒發熱咳嗽聲重胸膈隱痛鼻塞項強氣血稽留日久則鼻流清涕咳唾膿血腥穢稠濁甚則胸脅脹滿呼吸不利其脈未潰之先或浮緊而數或洪大而數既潰之後或芤大而數或弦細而數初發宜甘桔湯黑豆湯加減解毒開提已成宜百合固金湯加減滋水清金潰後宜用六味湯加減補陰保肺誠以清肺之熱救肺之氣則肺不致焦腐其生乃全蓋清一分肺熱則存一分肺氣而清熱必須散其火結滌其壅遏以分散其勢於大腸令膿血濁沫日漸下移因勢利導乃為不易之良法也夫肺為嬌臟屬太陰而體燥必被火熱之毒內攻致臟傷而膿血外泄醫者不知益肺之虛救肺之燥生肺之液反恣膽妄投燥熱之藥其能堪此虛虛之禍況難成易虧之陰日為膿血剝削而多氣少血之臟勢必熇熇不救且今日之人入房太過腎水素虛而母病及子化源益弱咳嗽增而虛象現由是肺喘生脹矣聲出音啞矣潮熱口渴矣食少下泄矣痰如米粥肌瘦如柴矣病勢至此皆由醫學無傳用藥誤治之明驗而救治之法舍參耆補氣熟地補血安能起垂危於萬一耶大抵血熱則肉敗營衛不行必蓄為膿是以金匱以通行營衛為第一義而脾旺則生金津液流行痰嗽漸減是以內經有欲治其子先健其母之旨薛氏云脾土虧損不能生肺金肺金不能生腎水故始成則可救膿成則多死苟能補脾肺滋腎水庶有生者若耑攻其瘡則脾胃益虛鮮有不誤者矣夫火熱為害肺氣壅塞須用升提之品俾清虛之臟毋致瘀滯而不通成氣血暴喪辛金受困更宜補元之法俾堅剛之體全賴血液而潤枯後之學者於金匱肺癰論而熟讀之則其治是症也庶不致誤投於初病矣肺癰之症初起難於辨別既成拘於清熱解毒千人一類用開提補元可為萬世之良法甘桔湯見喘症門黑豆湯黑豆二錢甘草四錢水煎服甘草乾薑湯治咳嗽痰涎咽燥而渴肺經虛熱甘草四兩炙乾薑二兩炒上咀片以水三升煮取一升五合分數次溫服百合固金湯生地二錢熟地三錢麥冬一錢五分貝母一錢百合一錢當歸一錢白芍一錢元參八分桔梗八分水二鍾煎八分食遠服肺痿肺痿一症金匱治法非不彰明奈混在肺癰一門精意難解然論脈條中謂脈數虛者為肺痿數實者為肺癰虛實之辨可謂詳悉醫家能細心會悟決不以肺痿之虛症而誤作肺癰之實熱矣夫肺為五臟之華蓋其位至高其質至清內主乎氣中主乎音外司皮毛人生血氣充足於內水火互藏其根斯嬌臟無畏火之炎金水有相生之用肺氣安得受克而痿弱不振者乎無如先天之稟既虧復又房勞不慎戕賊真元根本搖動致腎水虧而相火熾上薰肺金金被火刑觀其症則咳嗽失血矣寒熱往來矣盜汗側眠矣音啞咽痛矣上嘔而下泄矣切其脈或浮大空數或弦細而澀數矣病勢至此形體消削咯吐瘀膿色如桃花或如米粥此病劇而變肺痿之惡症竟為百死一生之危候醫藥難救其奈之何哉雖然病固難救而必欲立法以救之則責在補腎水以鎮陰火生津液以潤肺燥更宜參耆河車之屬填實下元補真氣以通肺之小管以復肺之清肅所謂補其肺者益其氣補其腎者益其精庶可起垂危於萬一也夫人身之氣稟命於肺肺氣清肅則周身之氣莫不服從而順行肺氣壅濁則周身之氣易致橫逆而犯上彼肺痿之形象與肺癰似是而實非肺痿發在病虛之後肺癰發在無病之初也肺痿咳白血而吐涎沫肺癰則咳臭膿而胸脅痛也肺痿人肌瘦而神倦肺癰人體實而強壯也肺痿病久始灑寒而潮熱肺癰初發則毛聳而惡風也肺痿脈芤數而無神肺癰脈浮數而有力也種種症脈不同如是是肺痿為虛誤以肺癰治之是為虛虛肺癰為實誤以肺痿治之是為實實實實虛虛損不足而益有餘如此而死者醫殺之耳余也察色按脈分別虛實審病情之吉凶求此中之順逆大約從外因而成肺癰者急宜調治雖肺傷而尚可補救從內因而成肺痿者多方培補奈肺枯而百法難療庸手不知仲景肺痿之論虛實混治兩症欠明惟用金銀花清熱解毒甘桔湯極力開提喘咳痰鳴危在旦夕病家情急遍閱方書始知肺痿之症以告醫醫家矇昧學淺才疏又誤認痿躄之候而著想指鹿為馬傷人性命莫此為甚也嗚呼以堅剛之體忽變衰靡之象無非木火炎於上君火灼於中腎氣不相顧土氣不相救而陰液內耗白血外溢肺臟之真氣盡泄金能保其全乎自今以後後學能知病之原察病之情熟讀仲景金匱方論講究甘草乾姜等湯悉心化裁神明運用於肺痿一症思過半矣闡發脈因症治之理已屬最上一乘又想見作此論時真有筆歌墨舞之樂人參養肺湯治咳吐痰涎色白痿頓脈大無力肺虛之證人參一錢五分白茯苓一錢炙甘草一錢黃耆一錢蜜炙阿膠一錢五味子二十粒水煎溫服甘草乾薑湯見肺癰門人參平肺湯人參天冬各四錢橘紅五錢知母七分甘草茯苓地骨皮各三錢桑白皮一兩每服五錢入姜水煎服胎瘧並三日瘧按瘧疾一症內經詳言之先賢備述之矣至於人生初次發瘧則為胎虐古人未有發明患此者延纏難愈輕則月餘重則數月或變虛咳或變浮腫多致喪命即體實之人亦成瘧母為終身之患是可憫也蓋瘧乃暑邪伏在募原之間呆在少陽之界不同傷寒溫疫傳裡之險常發瘧者數發之後邪無所容即從毛竅熟徑而出霍然愈矣若胎瘧之作膜原忽被其耗擾復又纏綿不已氣血由此大虧兼之隧道少疏通之機毛竅非熟由之路正愈虛而邪愈陷矣予悟此理初發投小柴胡湯加減數劑陰虛者改用救陰補元之法陽虛者改用溫養元陽之法俱重加人參俾營衛正氣大盛則膜原流戀之邪斯時急走隧道之間肌腠雖非熟徑而自有不能不出肌腠之勢矣或問曰胎瘧之故既得聞命矣乃三日瘧尤難愈於胎瘧抑又何也余曰膜原之界限宜分陰陽淺深之不同營衛之氣血亦分陰陽盛衰之各異在膜原之淺者陽盛於陰陽盛則正強而邪弱隨衛氣出入而瘧難久留在膜原之深者陰盛於陽陰盛則邪勝而正弱居營氣之間而瘧多伏藏所以邪中淺者一日而作邪中深者間日而作邪中極深者間二日而作也汪機云三日一發者非入於臟也由氣血盛衰而然氣血未補未至於強健已補強健邪無容留矣可見邪伏募原之深界而離肌腠之路遠須宜陽分肋氣之藥加血藥引入陰分方可掣起如是則氣血大盛邪不攻而自走經所謂邪正不兩立也或又問曰募原之界營衛之道安有淺深盛衰之不同子言得毋謬乎余曰經言邪氣內薄於五臟橫連募原其道遠其氣深其行遲何得無淺深之分經言陰陽上下交爭虛實更作陽並於陰則陰實而陽虛陽盛則外熱陰虛則內熱何得無盛衰之別但募原本是少陽表裡之界營衛既分陰陽而在表者又屬陽中之陽陽性動而行速故邪出表易在裡者又屬陰中之陰陰性緩而行遲故邪出表難一遲一速相拒交爭而所發之時日不同矣經曰陰氣多而陽氣少故其發日遠陽氣多而陰氣少則其發日近又曰其間二日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作此之謂也此症初發用補中益氣合桂枝湯升其邪陷於陰經久發腎陰虛而瘧不止者用六味合生脈散以補其真水久發腎陽虛而瘧不止者用人參養營湯八味湯以補其真火久發脾胃虛而瘧不止者用四君子湯或六君子湯以補其脾土總之此症本於根原內空衛外之陽不密邪有隙而可乘惟重加參朮煎湯吞八味丸久服自有神功血虧甚者加當歸氣弱甚者加黃耆若陰虛火盛者二母湯吞六味丸或陰虛火盛而胃滯者二母湯吞獨何丸治瘧之法不外乎是舍此而他求勢必變症百出矣理從悟入每遇病機他人苦思之而不能得即偶得之而格格不吐一經悟思偏出之亹亹其神於醫理者乎胎瘧小柴胡湯人參二兩柴胡八兩半夏半升黃芩三兩生薑二兩切片大棗去核十二枚甘草三兩炙上藥用水一斗二升煮取二升去渣再煎取三升溫服一升日進三服三日瘧補中益氣湯見暑症門桂枝湯桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚去核上用水七升煮取三升服一升日三服六味湯八味湯俱見眩暈門四君子湯六君子湯人參養營湯俱見中風門生脈散見燥症門二母湯知母貝母各等分水煎服獨何丸何首烏黑豆拌蒸為末煉蜜丸如梧桐子大每早滾湯下四錢痢症愚按痢疾一症非六淫之邪所感瓜果生冷所傷而後始有此患也余嘗觀古法相傳謂炎暑大行相火司令酷熱蓄積為痢近日醫家皆宗其說不知暑乃六淫之一中暑而發熱者有之受暑而發瘧者有之與痢症毫無關涉醫用其法者往往取效少而傷人多夫痢症即時疫中濁邪中下名曰渾者是也邪毒入胃脘之上焦則浮越於肌表而惡寒發熱邪毒中胃脘之下焦而走入大小腸則剝脂膏之膿血而後重裡急邪毒出肌表由三陽而傳入三陰入里殺人邪毒在腸臟致惡飲食而敗脾胃絕谷殺人若下痢而兼寒熱者殺人尤速此疫邪入胃之不同而見症之各別也蓋天地不正之雜氣種種不一而痢症疾速亦雜氣所鍾病遍於四方延門闔戶一人病此人人亦病此始也感受於天繼也傳染於人其為氣所感召已明驗矣且經不云乎夏傷於暑秋為痎瘧未見傳染也因於暑煩則喘喝靜則多言未見傳染也脈虛身熱得之傷暑未見傳染也而痢疾之傳染益信暑熱之無與況雜氣所著無方或發於城市或發於村落他處安然無有雜氣之所發無定或村落中偶有一二所發或一年中竟無一人所感而暑熱則每歲時之所必有瓜果每夏秋之所必熟何值此痢疾不發之年雖暑熱酷烈瓜果多食卒未見滯下而廣行如此則不辨而自明矣而余謂疫邪作痢之說亦不為無據矣此症初治宜用黃金湯解疫毒而救胃氣繼用四君子湯扶脾土而補元氣久則用八味加參湯補真元而生土氣經曰腎為胃關主二便而開竅於二陰者也即體實受邪於黃金湯中加黃連一味無不捷應若兜澀太早休息久痢邪在腸間體實餘邪不下者宜犀角地黃湯或巴豆霜丸體虛餘邪不下者宜六味歸芍湯或桂附八味丸此治痢大略之法也若症見膿血切膚少腹必急痛也赤白刮下脂膏有淺深也裡急後重或塞或熱而下迫或氣虛而下陷也口渴引飲或液少而亡陰或胃熱而火熾也是以治痢之訣要在虛實寒熱得其法則萬無一失矣第疫氣之來有一無二而人生稟賦不齊虛實寒熱各殊虛體受邪則為虛痢實體受邪則為實痢寒體受邪則為寒利熱體受邪則為熱利司命者其可不詳察歟嗚呼余曾見痢疾蜂起醫者洋洋得意謂家人婦子曰滯下發矣正吾技之擅長可操必勝之術也及其舉方非檳樸之破氣即承氣之攻下未幾嘔惡惡食之變在先冷汗呃逆之變在後醫家至此而技窮病家至此猶不悟推其故也緣誤認暑熱瓜果之利害不明疫邪入腸之傷人豈知疫痢之惡能絕人之谷削人之脂損人之脾傷人之胃耗人之氣血正氣為邪毒敗壞如是而醫尚惓惓於香連切切於承氣極之不可救而莫可如何也籲醫過矣醫過矣自制黃金湯黃土五錢扁豆四錢炒穀芽二錢炒茯苓一錢黑豆三錢甘草八分白芍一錢五分炒生薑三片金銀花三錢五穀蟲二錢炒研扁豆花十枚水二鍾煎八分不拘時服立方精確可為一百十四方矣四君子湯見中風門八味加參湯見審虛實門犀角地黃湯見吐血門巴豆霜丸巴豆去皮心研飯搗為丸每次滾湯下四五粒六味歸芍湯見中風門桂附八味丸見眩暈門攣症愚按拘攣屬肝肝主身之筋也古書有風寒濕熱血虛之不同然總不外亡血筋無榮養則盡之矣蓋陰血受傷則血燥血燥則筋失所滋為拘為攣勢所必至又何待風寒濕熱相襲而後謂之拘攣耶且精血不虧雖有邪干亦決無筋脈拘急之病而病至堅強其枯可知治此者必先以氣血為主若有微邪亦不必治邪氣血復而血脈行邪自不能留何足慮哉內經曰陽氣者精則養神柔則養筋又曰足受血而能步掌受血而能握指受血而能攝此之謂也攣主血虛一洗風寒濕熱之妄見養血舒筋湯治血虛不能榮筋而攣症作當歸二錢白朮二錢土炒茯苓一錢沙參一錢五分麥冬一錢棗仁一錢炒研牛膝一錢苡仁二錢丹參二錢何首烏二錢加桂圓肉五枚水煎服膈症愚按膈症病在上焦而其原實在下焦飲食下咽至膈不能直下隨即吐出乃賁門為病血液乾枯胃口收小初病漿粥尚可入病久飲食俱難下蓋血液枯熇津液不潤凝結頑痰而阻塞胃脘者有之氣結不行血滯成瘀而阻塞胃脘者有之第賁門之熇頑痰之聚瘀血之阻者皆由憂思過度則氣結氣結則施化不行酒色過度則傷陰陰傷則精血耗竭運守失職而脾中之生意枯五液無主而胃中之津液涸緣虛陽上泛挾衝任二脈直上陽明賁門終日為火燔燎迫之又迫不熇不已是以隔塞不通食不得入矣雖然膈之食不得入為有火與反胃之食久復出為無火迥乎不同而膈症之火其根實發乎腎若腎中水虧不能攝伏陽光而虛火不藏者治宜壯水之主從陰引陽而焰光自斂若腎中火虧不能生化元氣而龍火不歸者治宜益火之源補陽生陰而真氣上升如是則血液有生動之機賁門有滋養之潤胃司受納而脾司傳化矣夫酒色操心之輩多有此症為虛為實不辨自明若劉氏下以鹹寒之味損胃尤烈嚴氏分有五膈之名惑人失從不若養血益氣以通腸胃補陰助陽以救本原則大便潤而小便通下既宣通必無直犯清道上衝賁門之患也奈何學淺庸工泥於氣結不行阻礙道路之故妄投辛香破氣化痰清火之藥謂病生於鬱結而驟開之或得效於頃刻終必至於乾枯委頓而斃者不可勝數也張雞峰云病在神思間謂養其神清其思而後津液歸聚於胃中庶能稍延歲月病膈者其可不達觀而返觀內照耶余閱歷數十載見年少者無此患年老者有此症其為氣血之虧水火之弱上焦之枯腸胃之燥已明效大驗治此者不急急求脾腎根本而補救之而反從事於開關詭異之法以為捷徑也以為得計也以為理是也噫醫亦愚矣哉膈之因本於陰陽之虛自當補救根本泥於氣結投以破氣去病遠矣主此論以治膈不有春回寒谷哉六味地黃湯八味地黃湯俱見審虛實門通幽湯治幽門不通上衝吸門噎塞不開氣不得下大便艱難名曰下脘不通治在幽門當歸身升麻桃仁紅花甘草炙各一錢生地黃熟地黃各一錢加麻子仁三錢水煎服秘方治噎膈童便牛羊乳韭汁竹瀝蜜薑汁甘蔗汁和勻溫服又方以手巾裹杵頭糠時時拭齒或括下杵頭糠口內含之盜汗盜汗者乘人睡熟而出意同盜賊之義也蓋本原充實者睡則神氣收斂於內本元不足者睡則神氣浮越於外汗亦因之流溢總之由陰不平而陽不秘耳夫寤寐皆由衛氣為主晝行於陽動則為寤夜行於陰靜則為寐衛氣行里則表中陽氣不致平人營衛調和雖毛竅開發而津液內藏若腎失閉藏之職肝行疏泄之令水虛而火炎衛強而營弱內熱蒸蒸氣化汗泄亦毛竅疏豁有隙可乘也寤則目張行陰之氣復還於表而肌腠秘密汗欲出而無由矣治法宜滋陰以榮內益氣以衛外薛氏云腎氣虛弱盜汗發熱者用六味丸腎氣虛乏盜汗惡寒者用八味丸氣血俱虛而盜汗者用十全大補湯陽盛陰虛者用當歸六黃湯傷寒盜汗責在半表半裡膽有熱也用小柴胡湯是在醫家運用變化之妙而不得膠乎一定之則也寤則目張行陰之氣復還於表數語盡得盜汗之秘六味丸八味丸見審虛實門十全大補湯熟地三錢當歸三錢人參二錢茯苓二錢白朮二錢炒白芍二錢炒川芎一錢肉桂一錢黃耆一錢炙甘草一錢炙水二鍾煎八分食遠服當歸六黃湯黃耆二錢炙當歸一錢生地一錢熟地一錢黃柏五分黃連五分黃芩五分水煎服小柴胡湯見胎瘧並三瘧門脈間止變喘滿症論今夫脈理精微診切艱難口不能言傳指不能區別求其得於心應於手識病情而知生死者蓋亦寡矣夫脈之原也資始於腎資生於胃營行脈中衛行脈外脈不自行隨氣而至氣動脈應十二經中皆有動脈不獨手太陰寸口一經而診定生死則必不外於手太陰寸口者何也以此以屬肺主氣而司呼吸五臟六腑之氣血皆會於此人一心晝夜凡一萬三千五百息脈行五十度周於身營衛行陽二十五度行陰亦二十五度為一周故五十度復會手太陰寸口者五臟六腑之所終始故法取寸口也是以診脈之法有三部九候一部中有浮中沉三候診有百五動六部亦如之往來不止者為無病人而五十動有止者又可以決生死而起垂危切脈其可忽乎哉脈訣謂間至有促代結之不同有陰陽生死之各異有痰積有狂斑有毒疽有氣衰胎墮等候要皆真元敗而氣血枯無論其促代結之分則二三十動之間時間一止者其離根尚淺猶可延纏歲月若三五動一止二三動一止者其離根已近死期將至其見症也豈止如脈訣所云痰積狂斑毒疽胎墮等類者哉余閱歷多載切脈初知見症頗多大約三五動一止二三動一止之脈初病必氣短間亦咳嗽漸變面浮足腫劇之則遍身浮氣腹大囊腫不得平臥水泛為痰穀食日減已成不可救藥而醫者曰間止之脈老人不為病即病矣亦不過痰阻經絡壅塞不通不足為慮也嗚呼病家聞此說即深信醫而任之專醫家進此說則大劑藥而攻之速不知間止乃生死相關攻伐驟進氣血驟竭可以計日而亡矣夫脈以氣血為貫間止則氣血不續三五一間二三一間則氣血更不續矣初病有氣短之驗醫獨未之見乎間止而變喘滿醫獨未之聞乎蓋此症由於肺腎肺主諸氣肺氣虛則喘咳肺主皮毛肺氣虛則浮腫肺司呼吸肺氣虛則脈不貫肺主通調水道肺氣虛則小便短少溢於肌肉毛竅水出而尤根源於腎以腎為生氣之源金水相生子母之臟內經曰其本在腎其末在肺皆聚水也即此之謂且氣短在先浮腫在後為母傳子即脈不間止已屬逆症況間止而先喘後滿無胃氣者乎縱有良醫日投八味參耆之屬無益矣經不又云乎呼出心與肺吸入腎與肝脈隨呼吸為性命之根蒂生死之源頭豈容間斷庸手不悟切脈艱難而曰痰凝氣滯老人不為病也其信然耶其不然耶附案洪坑洪翰思先生年七旬有二己巳六月患背疽疽愈後大便泄瀉且有血脈息沉細三五至一間至十二月漸變氣促咳嗽遍身浮腫腹大囊大夜不能平臥諸醫皆雲氣血凝滯風邪未清藥投幾脫請餘一診余辭不治姑與參地河車之屬投之半月足流黃水氣消咳減一月全瘳惟間止之脈不退延至五月復喘腫而卒脈至間止無論結代總屬不治特有遲早之異耳得此明論顛撲不破而行文亦有韓蘇手意那得不壓倒一時門人敏識兩儀煎治肺腎虧虛永息間止人參一錢熟地三錢陳米五錢炒水煎服或倍為丸
