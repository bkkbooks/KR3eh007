body:
  text: 卷下疫症疫病是天地不正之異氣四時皆有能傳染於人以氣感召從口鼻而入不比風寒乃天地之正氣從皮毛而入不傳染於人者也又與瘧相似但瘧乃天地暑熱之正氣呆在少陽一經不傳染於人寒熱各半不比疫病起始凜凜惡寒繼而大熱晝夜不退寅卯二時是疫病交關之所此時熱可暫退過此又發大熱矣疫病亦有間日發寒熱者但發時寒短熱長不呵欠不鼓頷為異耳醫家大病概認作傷寒治誤謂邪從毛竅而入藥進羌防以散太陽之邪又謂為少陽陽明二經藥進柴葛以散少陽陽明之邪不知疫從口鼻而入多在募原少陽之界亦在胃中陽明之腑表散不惟疫不能解反耗一身津液元氣邪反乘虛入里或傳少陰或傳厥陰人事昏沉而元氣敗壞血液耗灼未有不死者矣故余創立救陰解疫毒一方初病即用意謂先補正氣正旺則內臟堅固邪無由而入陰回則津液內生邪不攻而自走張仲景建中湯之意也且內有甘豆銀花黃泥之屬解熱毒之邪於扶正之中又何患熱不退而病不痊耶若其人本體素虛服救陰而不效則從而用八味以救陽其人本體脾虛服救陰而不效則從而用補中異功之屬以救土此又法之變也治疫妙法創自己見真闢地開天手也先生屢治屢效乾隆壬申歲活人無算立有醫案其功偉哉新制救疫湯黑豆三錢綠豆三錢白扁豆三錢貝母一錢甘草一錢金銀花二錢丹皮一錢當歸三錢玉竹三錢老薑三片大生何首烏五錢黃泥五錢泄瀉者當歸易丹參赤飯豆三錢補中益氣湯見暑症門建中湯膠飴一升甘草一兩炙桂枝去皮三兩芍藥六兩大棗十二枚去核生薑切片三兩水七升煮三升去渣納膠飴微火消解溫服一升日三服嘔家不用建中以甜故也異功散人參二錢白朮二錢炒陳皮一錢五分甘草一錢炙加薑棗水煎服新增醫案附後外有歷年疫病危症醫案一集嗣刻程維新年五十二歲乾隆辛酉九月八日忽然微寒發熱醫用發表消導藥熱不退易醫用清涼之劑不應又易一醫診之用達原散加黃連知母花粉之屬三劑人事漸倦寒不成寒熱不成熱小便如血延余視之診其六脈如絲舌白無苔急進歸脾湯加減寒熱始退六脈方起神色方轉飲食方進再進數劑霍然而愈倘執脈伏為內熱未解忌用補劑仍投承氣下之焉有生理余妾王氏年二十四歲乾隆乙丑八月十九日午間忽惡寒發熱診右關脈模糊鼓數即服何首烏丹皮麥冬玉竹當歸白芍甘草黑豆貝母之屬是夜發熱至天明次早又進前藥加丹參地骨皮午後又進第二劑是夜壯熱到天明早晨診脈仍數而無倫舌白苔說話帶硬進六味湯加麥冬歸芍玉竹之屬服之粥後余出外回室人程氏告余曰病者漸昏譫語癡笑呃逆大便自遺得毋傳經乎余診之果入里也急投人參二錢和童便灌之薄暮熱退呃逆止下利亦止人事稍清如是熱退者三日夜矣至三日又發熱如瘧仍進前藥延纏半月寒熱漸退未幾又變咳嗽面浮喘而不得平臥用六味合固金湯之意加減不應改用八味加減亦不效事急矣進大劑陰陽兩補之藥如熟地枸杞人參麥冬菟絲之屬服至八十餘劑然後嗽止氣消而愈月事阻有半載方通始終不服表藥得以保全附此為發表者戒小女年十四歲乾隆癸酉七月二十六日下午忽惡寒發熱天明始退是日余往歙西更方回因未服藥次早診其脈弦數而大頭眩嘔吐舌心焦黑用何首烏當歸玉竹黃泥甘草金銀花黑豆之屬投之至夜稍安二十八日早又大發熱而不惡寒診脈仍數大惟舌焦黑全退頭眩嘔吐未止於前方加參鬚一錢服一刻熱退其半二十九日再進前藥變瘧疾五發而痊汪蘊谷識溫疫論時疫一症何自而起哉起於非其時而有其氣是為天地之厲氣是為不正之異氣沿門排戶傳染於頃刻之間流散四方殺人於數日之內醫家不知疫毒之烈而概以傷寒之法施治無怪乎病愈急而藥愈亂不死於病而死於醫不死於醫而死於聖經之遺亡也夫厲氣之來有從鼻而入者則伏於募原有從口而入者則中於胃腑其間體實而受邪者有之體虛而受邪者有之本熱而假寒者有之本寒而假熱者有之非可盡投膏黃純用芩連而專以丹溪河間為法者也蓋時疫之初發與傷寒似同而實異時疫之傳變與傷寒似異而實同當其邪在三陽也惡寒壯熱頭痛身痛口渴引飲嘔吐下利脈大而數又可吳君立達原一方乃驅邪離散直達巢穴之藥白虎承氣乃辛涼推蕩清火逐邪之劑惟壯實之體投之可謂萬舉而萬全倘遇內虛之輩白虎失之過寒承氣失之過攻苟非神明變化別會長沙公之秘旨未有不誤人於反掌間者矣至於邪陷三陰臟氣受敵其見症也神昏目定撮空捻指譫妄舌黑脈沉細而數種種惡症疊出吳君用仲景法投承氣湯非不盡善第恐正弱邪強證實脈虛之輩當此邪傳三陰元氣由邪熱而虧胃氣由邪熱而耗臟氣由邪熱而傷不知變計徒拘攻下一法虛虛之戒可不慎歟獨是今日醫士不究疫病之原識病之情僅以消散之品混治至七八日間忽然內陷斯時既不敢用參附以回陽又不敢用歸地以生陰展轉思維向病家言曰與其委之莫救不若復進膏黃芩連之屬冀厥少回而疫邪解未可知也斯言也強壯而脈實者耶痞滿而燥實者耶膏黃芩連之投固其宜也不然三陰之經與臟氣相近非察脈辨症而藥味難投其亦不知厥逆連臟之旨而深長思矣余兄廣期謂疫病乃熱毒為害治法以逐疫解毒為第一義因設立乾一老人湯一方除疫毒而退熱邪正如喻氏所謂上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒之意同而可稱為治疫之聖藥也乾一老人湯黑豆五錢甘草三錢金銀花五錢鮮黃土五錢水煎服達原散治疫症初起檳榔二錢厚朴一錢草果仁五分知母一錢白芍一錢炒黃芩一錢甘草五分水二鍾煎八分午後溫服凡疫邪遊溢諸經當隨經用引以助升泄如脅痛耳聾寒熱嘔而口苦此熱邪溢於少陽經也本方加柴胡一錢如腰背項痛此邪熱溢於太陽經也本方加羌活一錢如目痛眉稜骨痛眼眶痛鼻乾不眠此邪熱溢於陽明經也本方加乾葛一錢白虎湯治疫症脈長洪而數大渴大汗通身發熱石膏一兩知母五錢甘草一兩炒陳米一撮加姜煎服大承氣湯以下三承氣湯惟熱邪傳裡脈實症實者宜之體素虛寒及未傳裡者禁用大黃五錢厚朴一錢枳實一錢芒硝三錢加姜煎服弱人減半邪微者各復減半小承氣湯大黃五錢厚朴一錢枳實一錢加姜煎服調胃承氣湯大黃五錢芒硝二錢五分甘草一錢加姜煎服按三承氣湯功用彷彿熱邪傳裡但上焦痞滿宜小承氣湯中有堅結者加芒硝耎堅而潤燥病久失下雖無結糞然黏膩極臭惡物得芒硝大黃有盪滌之能設無痞滿惟存宿結而有瘀熱者調胃承氣宜之三承氣功效俱在大黃余皆治標之品也不耐湯藥者或嘔或畏當為細末蜜丸湯下黃疸發黃一症有內傷陰陽之不同外感傷寒時疫之各別傷寒期十八日而始痊時疫待陽明解而熱退內傷之陽黃熱濕鬱在胃也而其原本於脾虛內傷之陰黃寒濕蓄在胃也而其原本於腎虛古人雖分有五疸之名而要不外於脾腎蓋脾氣旺則能散精於肺通調水道下輸膀胱何熱鬱而生濕之有腎氣壯則火能生脾土而中州運行何寒蓄而生濕之有縱實體而受濕熱雖進清利之品在先亦必培土之味在後而始收功也余嘗治陽黃之症大補脾陰之中少加茵陳梔子治陰黃之症大補腎元之中重加參朮炙耆莫不應手取效不然徒知濕之可利熱之可清攻伐多進脾元敗而腎元虧中滿之症變雖長沙復起亦無如之何矣又有疫病發黃邪熱在陽明脈數發熱口渴引飲大便秘結小便赤澀宜陳皮扁豆穀芽神麯黑豆甘草石斛麥冬赤茯苓何首烏車前子鮮黃土之屬解疫毒而救脾胃俾邪從陽明解而出表為順也若其人平日脾腎素虛雖邪熱在陽明而脈細無力人倦少神冷汗自出大便不實小便黃赤急宜參朮歸地脾腎兩救庶不致內傳厥少而有虛脫之險也倘黃未退而瘀血先下此陰絡已傷土氣已壞雖重進參朮萬無生理者矣蓋外感之黃熱解而黃自消內傷之黃元回而黃始退且外發體實者投清涼可愈內發元虧者非補益不痊經曰中央黃色入通於脾如陰黃腎中元虧胃氣不升中央之地失健運之常脾之真色盡現於外欲求其黃如羅裹雄黃也不亦難哉彼黃疸輩兩目如金久久不退一以濕熱由此而現一以真色由此而泄陽明主宗筋諸脈皆屬於目而上走空竅也外此胃脘久痛變為黃疸此乃脾胃大虧非內挾瘀血即中藏痰飲虛熱者救脾陰為急虛寒者救胃陽為先庶不致有脹滿之患矣闡發疸症無一遺義上渡金嘉會年三十七平日嗜酒己巳十一月因食羊肉又值夢泄之後右脅急痛數日不大便始投破滯不應繼用桂附不效再進攻下丸藥大便雖通而痛不止適余在渠村中邀去一診兩脈細數舌黑如墨余曰肝脾腎皆虧內挾瘀血作痛非停滯非陰症但先用破氣溫熱之劑後用大攻大下之藥是泥通則不痛之說元氣受傷而誤投矣治用扶脾養元益血救腎之品服下稍定次日兩目及一身發黃易醫不知內傷為害反進分利清熱之藥大下瘀血鬥許呃逆而亡蓋此症乃瘀血暴脫陰絡受傷之故其發黃者血蓄於中元氣不運脾之真色盡現於外也自識理脾陰煎治陽黃之症南沙參二錢白朮二錢土炒茯苓一錢山藥一錢五分白扁豆二錢炒陳皮一錢甘草五分茵陳二分梔子五分白芍一錢炒苡仁三錢穀芽三錢炒水煎服培腎元煎治陰黃之症熟地二錢當歸二錢山藥一錢枸杞一錢附子一錢白朮一錢五分茯芩一錢五分炙甘草一錢炮姜八分黃耆一錢五分人參一錢水煎服四君子湯茵陳五苓散清濕熱利小便茵陳豬苓赤苓白朮土炒澤瀉各二錢水煎服消渴消渴一症責在於下腎水虧虛則龍火無所留戀而遊行於中上在胃則善食易飢在肺則口渴喜飲亦有渴而不善食者亦有善食而不渴者亦有渴而亦善食者火空則發是也若火灼在下耳輪焦而面黑身半以下肌肉盡削小便所出白濁如膏較之上中二消為尤甚亦有上中二消而及於下消者勿泥看也治法壯水生津制火保元而尤惓惓於救脾胃蓋水壯則火熄土旺則精生真火歸原在上則肺不渴矣在中則胃不飢矣在下則肉不消矣倘補陰之法不應正治之法不效不得不從反佐之法益火之源以消陰翳而投八味救脾胃之藥亦不可缺也但白朮宜慎用耳張景岳專以救腎為主而進八味丸謂枯禾得雨生氣歸巔必須腎中元氣薰蒸津液生而精血旺三消之症方可漸愈不然徒用白虎之方暫解一時多服寒涼反能助火真火自焚五臟灼枯肌肉受敵絡脈不通榮氣不從逆於肉理疽發而病不救矣若其人壯實脈洪有力人參白虎亦未嘗不可投但在臨症者神明變化耳培養元氣俾薰蒸以生津液精血愈三消之法莫善於此與古法用寒涼者奚啻霄壤之隔若實大在胃第患口渴即進茶湯亦可解免以此思消症豈白虎所能治者哉八味丸見審虛實門人參白虎湯石膏一觔打碎知母六兩人參三兩甘草二兩粳米六合上四味以水一斗煮米熟去渣溫服一升日一服丹溪方治胃熱善消水穀黃連天花粉等分為末生地汁白花藕汁二汁熬膏入上藥末和入牛乳薑汁白蜜為膏徐徐留於舌上以白湯少許送下六味湯見審虛實門壯水之主以鎮陽光則渴飲不思易簡地黃飲子治消渴咽乾面赤浮躁人參生地熟地黃耆蜜炙天冬麥冬澤瀉石斛枇杷葉去毛蜜炙甘草炒各等分上㕮咀每三錢水煎服忍冬丸治渴疾愈後預防癰疽忍冬根莖花葉皆可用上用米麴酒浸於瓶糠火煨一宿取出曬乾入甘草少許為末即以所浸酒和為丸每服五十丸酒飲任下不寐不寐一症責在營衛之偏勝陰陽之離合醫家於衛氣不得入陰之旨而細心體會之則治內虛不寐也亦何難之有哉夫衛氣晝行於陽二十五度而主寤夜行於陰二十五度而主寐平人夜臥之時呵欠先之者以陽引而升陰引而降陰陽升降然後漸入睡鄉矣若肝腎陰虧之輩陽浮於上營衛不交神明之地擾亂不寧萬慮紛紜卻之不去由是上則兩顴赤中則胃脘脹下則小便數而坐以待旦欲求其目暝也得乎又嘗見初睡之時忽然跳躍似驚而醒醫以為心虛膽怯而始有此孰知有大謬不然者何也緣陽升而陰降陰陽交合有造化自然之妙奈營弱衛強初入之時契合淺而脫離快升者復升降者復降形體之間自不覺如有所墜而斯時復寤矣明乎此則治陰虛不寐者必須壯水之主以鎮陽光蓋水壯則火熄心靜則神藏乙癸同源而藏魂之臟亦無相火妄動之患倘其人本體陽虛虛陽浮越而不寐又宜歸脾八味之屬陰陽相濟益火之源蓋陽生則陰長逆治則火藏而心神自安其位耳至於外感時疫而不寐者乃邪氣之耗擾內傷停滯而不寐者乃胃中之乖戾更有喘咳不休諸痛不止瘧痢不愈而不寐者無非本症之累及但治其受困之由而無有不酣睡者矣雖然治外因者投藥易治內因者投藥難效先君子於陰不維陽達旦不寐一症專用純甘之味加入犀角羚羊角龜板虎睛琥珀龍齒珍珠之屬以物之靈而引人之靈兩相感召神有憑依誠法中之善者也彼逍遙散之舒肝補心丹之安神溫膽湯之化痰未為不善是在用之者焉何如耳頭頭是道言言入理步步有法至哉余夜夢同一道者談醫於不寐症猶記幾句云火熄則氣平心靜則神斂營衛交而心腎通萬慮消而魂魄藏心依於息息依於心高枕安臥矣醒時思之覺衛氣不得交於陰之旨確乎不易也乾隆庚午嘉平月自識歸脾湯見中風門天王補心丹生地四兩洗淨棗仁一兩炒天冬一兩炒麥冬一兩炒當歸一兩酒洗人參五錢元參五錢丹參五錢炒茯神五錢桔梗五錢遠志五錢炒石菖蒲五錢柏子仁一兩炒五味子一兩炒煉蜜為丸每兩分作十丸金箔為衣每服一丸燈心棗湯下食遠臨臥服或分作小丸亦可類方如前方內加酒炒黃連二兩八味湯見審虛實門逍遙散見眩暈門溫膽湯陳皮半夏湯洗枳實竹茹各一錢生薑甘草四分炙上六味水煎服酸酒湯治虛勞虛煩不寐酸棗仁一兩炒研甘草一錢知母一錢茯苓一錢川芎二錢水二鍾煎八分服鱉甲丸治四肢無力膽虛不寐鱉甲炙棗仁炒研羌活牛膝黃耆蜜炙人參五味子各等分上為細末蜜丸梧子大每服三錢溫酒送下胃脘痛胃與胞絡近俗謂之心痛非心痛也真心痛則旦發夕死夕發旦死無藥可救者也蓋陽明中土乃水穀之道路多氣多血運化精微通於脾而灌溉四臟為後天之本胃不綦重矣哉無如人生酒色過度七情乖違飢飽不節胃脘因之而痛有寒熱氣血痰蟲食滯內虛之不同治法雖各別然總不外虛實寒熱氣血之間細為之詳辨也夫痛而虛者必喜按痛而實者必拒按寒痛者得溫稍定熱痛者飲冷稍安中焦寒則氣虛不運或生痰飲者有之或蓄瘀血者有之或蛔蟲上逆者有之中焦熱則氣阻不行或吐酸味者有之或吐苦汁者有之或食停蛔動者有之如真知其為虛寒痛也則塞因塞用以補之真知其為實熱痛也則通因通用以瀉之虛寒而挾食挾瘀生痰生蟲者以溫補藥中消之逐之實熱而挾食挾痰吐蛔嘔酸者以清涼藥中攻之伐之此治胃脘痛之成法也倘神明變化則存乎其人耳雖然胃間受病人所易知肝木凌脾人亦易曉苦男子肝腎虧挾虛火而上逆婦人衝任弱挾肝陽而上升多有胃脘作痛之症醫家不察病原不識病情非投辛溫耗氣即用清涼敗血愈治愈甚何其庸也內經曰衝脈起於氣街並少陰之經挾臍上行至胸中而散任脈起於中極上毛際循腹裡上關元至咽喉可見胃脘之痛有自下而上由腎而胃隱隱示人勿泥中焦為病也何也衝任二脈與陽明之脈兩相照應衝任虛則鼓動陽明之火結聚不散而筋脈失榮痛之所由生也治法須填補真元以生津液導引元陽以補真氣如此治法非膽大心小者安能知此中之奧妙耶又有肝陰久虧肝葉枯燥抵塞胃脘痛不可耐者法宜六味飲乙癸同治參乳湯氣血雙救高鼓峰之論醫者亦曾聞之乎大抵肝主疏泄鬱則木不舒而侮所不勝腎為胃關虛則精氣耗而累及中土至於氣分有餘之痛延胡香附有奇驗不足之痛人參桂附有殊功血分有餘之痛桃仁瓦楞可立應不足之痛當歸熟地亦取效而敢云通則不痛者盡病之情哉丹溪曰諸痛不宜補氣此惟邪實氣滯者當避之而曰諸痛皆然吾不信也外此有胃脘成癱疼痛不休食飲難入者自必惡寒發熱脈息芤數為別症不多見亦不易治也議論透闢一線不亂一筆不漏六味飲見審虛實門參乳湯見燥症門拈痛丸治九種心痛五靈脂炒蓬朮煨木香當歸各等分上為末煉蜜為丸如桐子大橘皮煎湯送下腫脹辨或問於余曰腫與脹有辨乎余曰腫自腫而脹自脹不可不辨也蓋氣血流行臟腑調和脈絡疏通在外安得作腫在內安得作脹而為有病之軀耶緣其人腎氣虛而失開闔之權肺氣虛而失清肅之令脾氣虛而失健運之常表氣虛而外邪易入於是在肌肉則腫生在臟腑則脹生現於外而自知其腫人亦知其腫也發於內而自知其脹人不知其脹也其腫脹之多端虛實之各異風寒濕熱水蟲血食之各種不詳悉言之何以示後學而知所適從哉夫風寒外入之腫則為實症如頭面之腫發頤之腫牙齦之腫之屬是也濕熱外入之腫多實而亦有虛症如瘡瘍之腫單腹之腫痛痹之腫之屬是也若氣水蟲血之腫則有虛實兩症如目下之腫周身之腫手足之腫腹皮光亮之腫腎囊腎莖之腫腹有青筋紅筋之腫之屬是也治法自有各門方藥而以症合脈為盡善也然脹病則與腫病迥乎不同矣腎火衰微中土虛寒脾元不運而脹矣水不生肝木鬱不達兩脅不和而脹矣陰火灼肺金氣膹郁喘咳壅塞而脹矣不特此也又有濕熱在脾胃而脹矣水飲在中脘而脹矣瘀血在中焦及蟲積在腸胃而脹矣氣滯食阻在陽明而脹矣大小便不通在少腹而脹矣外風無脹病也而脹病亦不一也大抵腫有形而脹無形脹者腫之漸內傷者居多腫者脹之劇外感者無與內傷有脹而亦有腫外感有腫而卻無脹以虛脹而作實治不腫不已以實腫而作虛醫雖脹無害醫家務必以外腫內脹確認親切則腫自腫而脹自脹不有了然胸中者乎安可不與子細辨之乎如剝蕉葉如抽繭絲名士名醫兼而有之普濟消毒飲見頭痛治風寒外入諸腫察各症虛實加減用壯火溫脾湯治腎火衰微中土虛寒脾元不運而脹白朮三錢土炒炙甘草一錢山藥二錢陳皮八分芡實二錢製附子八分茯苓一錢水煎服加味逍遙散治木鬱不達兩脅不和而脹柴胡七分薄荷五分當歸一錢白芍一錢炒陳皮七分甘草五分茯苓八分白朮二錢土炒丹皮一錢山梔五分共為末每服五錢熱鬱湯治陰人火灼肺金氣膹郁喘咳壅塞而脹熟地三錢麥冬二錢南沙參二錢阿膠一錢五味子十粒胡桃二枚打碎水二鍾煎八分服燥濕消中飲治濕熱在脾胃而脹熱因濕燥濕而熱自除白朮一錢五分土炒陳皮一錢茯苓一錢半夏一錢苡仁二錢炒白扁豆一錢五分炒水煎食後服小半夏湯加茯苓治水飲在中脘而脹半夏五錢生薑五錢茯苓三錢加佛手三片水煎食遠服平中飲治瘀血在中焦作脹人參一錢白朮一錢五分丹參二錢瓦楞子一錢醋淬研碎桃仁一錢炮姜八分水煎服寬中安蟲丸治蟲積腸胃而脹使君子二兩去殼陳皮二兩乾薑七錢煨檳榔七錢烏梅二十個木香五錢南星五錢薑製上研為細末蜜丸每晨砂糖水下三四錢消胃飲治氣滯食阻在陽明而作脹製半夏一錢陳皮一錢五分神麯一錢厚朴一錢姜炒萊菔子一錢炒研穀芽二錢炒砂仁八分加煨姜二片水煎服牡蠣炮姜散治寒秘大小便不通作脹通二便則脹已牡蠣一兩煅研炮薑末一兩男病用女人唾津調手內擦熱緊掩二丸上女病用男人唾津緊調手內擦熱緊掩二乳上得汗愈或內服半硫丸又方治熱秘大小便不通作脹取大田螺連殼打碎入麝香少許貼臍上以手揉挼之立通內服涼膈散脅痛今夫古書論脅痛一症不徙責在肝膽而他經亦累及之有寒熱虛實之不同痰積瘀血之各異支離繁碎使後學漫無適從而投劑不驗無怪乎變症多端傷人性命者多多矣嘗考經旨謂肝脈挾胃絡膽上貫膈布脅肋膽脈貫膈絡肝循脅裡其直者循胸過季脅是兩脅之痛皆屬肝膽為病內傷者不外氣血兩端外感者責在少陽一經而已蓋肝為將軍之官其性暴怒非怫意交加則憂鬱莫解非酒色耗擾則風寒外襲痛之所由生也使其人而虛寒也者則內臟虧而痛矣使其人而虛熱也者則隧道塞而痛矣使其人而實熱也者或邪氣入而痛或鬱火發而痛矣痛在氣分者治在氣寒者溫之虛者補之熱者清之實者泄之血藥不宜用也使其人而血虛也者則肝少血養而痛矣使其人而血熱也者則木火內灼而痛矣使其人而血分實熱也者或邪在半表半裡而痛或滿悶懼按多怒而痛矣痛在血分者治在血血虛者以血藥補之血熱者以陰藥滋之血實者以苦藥通之氣藥不宜用也更有瘀血內蓄痰飲內聚及肥氣痞氣皆屬有形之積非益血則邪不退即令氣寒而得此亦宜補陽在先補陰在後陰陽兩補痰瘀除而積聚消脅痛豈有不愈者哉雖然操心者常有此症房勞者每有此患人多委之莫救而藥投罔效者何也醫家不明肝腎同源精髓內空相火易上之理也故其用方一味辛香行氣冀其奏功不知辛能通竅香能耗血肝病不已復傳於肺而咳嗽喘促甚至血動斯時有莫可如何者矣是以初起確認為肝腎之病宜乙癸合治用六味加人乳河車之屬以人補人以血補血俾水生而木榮母實而子安正治之法也倘氣因精虛宜用八味加人參河車之屬陰中求陽坎中生火從治之法也或者謂內傷脅痛逍遙散乃不易之方外感脅痛小柴胡為必用之藥有此二者可以盡病之情乎而猶未也誠以法之運用無窮方之變化無定通因通用者治肝邪之有餘塞因塞用者治肝臟之不足而其間必以拒按喜按探虛實之消息喜溫喜冷驗寒熱之假真更以以脈之大小遲數有力無力為辨是在醫者神而明之勿泥古法而不化也且脅痛而及他臟者亦有之矣咳唾腥臭者肺痛也痛連胃脘嘔吐酸味者木凌脾也痛而寒熱譫語如見鬼狀者婦人熱入血室也舍氣血而何所補救哉蓋甘可緩中則木氣調達自然右降而左升和能平怒則疏泄令行漸次氣充而血潤脅痛云乎哉以韓蘇之筆寫軒岐之旨那得不壓倒群英六味湯見審虛實門八味湯同上逍遙散見眩暈門小柴胡湯見肺痿並虛痿門痹症痛痹一症肝腎為病筋脈失於榮養虛火乘於經絡而紅腫疼痛若腫痛不紅得溫稍定者又屬虛寒也初起惡寒發熱類於傷寒多腫痛於四肢經絡之間或左右移動或上下游行或脈大而數或細而數或細而遲或細而澀或大而空醫家認作風寒濕三氣雜至之說概以外邪為治病勢漸增陰液漸耗虛虛之禍有不可勝言者矣蓋風自內動濕熱內生者屬陰虛而有火表之清之症變虛損者居多寒自內發寒濕內生者屬陽虛而無火表之消之症變中風者居多即令其人體實果系外邪侵入表散不應者雖進大涼之藥痛止而腫消亦必用扶脾益血之品以收後效又有服熱藥太過胃中蘊熱日深筋脈不利不能轉移手足腫痛如錐苦楚異狀以陽明主宗筋筋熱則四肢緩縱痛歷關節而為熱痹也醫家不知清熱降火泥於風寒濕三氣雜至之說非表散風寒則溫經利濕火上添油愈服愈熱其症口渴面赤聲高叫喊大便秘結小便短赤脈數大有力或洪大有力所謂歷節白虎風症痛如虎齧也治法宜黃芩黃連黃柏石膏生地知母元參之屬清陽明之積熱降有餘之實火然後熱解筋舒而痛方定此種極少而慎治不可不知而誤治也雖然內經有入臟者死留連筋骨間者痛久留皮膚間者易已之旨足見內生之風寒濕三氣鼓舞於經絡之中者恐用攻表耗元之藥而臟氣空虛真陰欲竭外入之風寒濕三氣鼓舞於經絡之中者恐用攻表耗元之藥而臟氣受敵真陽欲脫況痹者閉也乃脈絡澀而少宣通之機氣血凝而少流動之勢治法非投壯水益陰則宜補氣生陽非急急於救肝腎則惓惓於培補脾土斯病退而根本不搖也倘泥於三氣雜至為必不可留之邪而日從事於攻伐是體實者安而體虛者危矣可不慎歟探本之論與泥於風寒濕三氣之說者有上下床之別六味湯八味湯均見審虛實門十全大補湯見盜汗門四君子湯見中風門清熱定痛湯治脈數有力歷節白虎痛風症此方主之生地三錢元參一錢五分麥冬二錢知母一錢黃連五錢石膏二錢黃柏五分黃耆一錢蜜炙甘草五分加黑棗三枚炒陳米五錢水二杯煎杯半空心服痿症痿症是肺熱葉焦兩足軟弱而不任地不痠痛不紅腫與痹症異也肺氣熱則通陽明陽明主宗筋束骨利機關陽明為熱所灼而筋脈弛長痿病大作是陽明之熱肺熱累及之也下部屬肝腎根由陰虧而髓空火逆於肺肺葉焦枯金不生水水益虧而火益熾筋為熱灼未有不痿躄者也丹溪有東實西虛瀉南補北之法壯水之主以鎮陽光火歸窟宅金不受火刑而陽明亦無肺熱之氣乘之宗筋柔和機關可利耳譬之弓逢暑月而力輕逢寒月而力重此症之筋痿亦猶是也痿手者少痿足者多痿而不咳尚可延纏歲月痿而咳嗽虛損將成死期近矣愚更謂痿病之來確在筋脈之間肺熱葉焦亦是肺葉之脈絡焦枯不是肺臟焦枯若是肺臟其葉已焦火灼之甚安有足痿在下而肺金不咳嗽者乎尚有十年不咳而其人存者乎難經曰一損損於皮毛皮聚而毛落痿果肺臟葉枯則身中毛髮盡皆敗落矣何今日之痿病獨有不然者邪發明肺熱葉焦之旨真超前越後得未曾有補北健行湯治痿症足不任地真水不定陽明為熱灼而小筋弛長此方立效生地三錢熟地三錢茯苓四錢丹皮一錢龜版三錢女貞子二錢生苡仁四錢南沙參二錢丹參一錢阿膠二錢山藥一錢五分水煎服瘡閉瘡閉一症古書不多見病者得之十有九死是為極危極重之候宜醫家之所當辨者何古人反未之言耶及考之各方書惟王肯堂先生有云患生瘡用干藥太早致遍身腫宜消風敗毒散若大便不通升麻和氣飲若大便如常或自利當導其氣自小便出宜五皮飲和生料五苓散若腹腫只在下宜除濕湯和生料五苓散加木瓜如澤瀉之數如此治法亦皆治標而不求其本也夫瘡之生也由於風濕熱毒中於皮毛不時而癢愈癢愈發愈發愈多瘡雖有大小之不同必待毒氣盡發方可漸愈安得有所謂瘡閉之候哉然任其自然而生者則任其自然而愈毒氣外達瘡無由而閉奈何今人不知此症之惡一見瘡發急用水銀硫黃之屬薰之擦之望其即日而痊不知毒氣正發於皮毛之間而反用藥以禁其所出則毒不達於皮毛而內攻肺臟以肺主皮毛故毒得以入肺也然肺臟中毒則通身肌肉浮腫咳嗽喘促胸滿壅塞不能平臥痰鳴鼻動小便短少是外瘡雖沒而內毒更烈當此之時雖欲求其出而不可得也不死何待耶其通身肌肉浮腫者以肺氣中毒則不能下行清肅之令而水妄溢也其咳嗽喘促者以肺臟中毒不得宣通阻礙氣道也其小便不通者以肺有毒而不能通調水道下輸膀胱也其胸滿不能平臥者以毒入於肺則肺葉生脹也其痰鳴鼻動者以瘡毒內攻肺氣將絕也以上惡候極為危險治之稍失鮮不誤人臨症者急宜速救肺臟而兼以解毒加入鮮發之物以托毒外出俾瘡盡發於肌表而不使內攻於肺庶幾可保無虞倘不知此理而徒用羌防之屬汗之散也是人既入井而又下之石矣然則羌防之不可用者何也以邪之所湊其氣必虛其人體弱也若實體而投羌防又何害焉瘡閉方法又超人一乘矣神化若此能無後賢哉保金宣毒飲瘡症誤治毒氣入肺諸證悉急用此方治之其驗如神南沙參三錢麥冬三錢百合五錢貝母三錢筍尖五錢糯米五錢鯽魚一尾水煎服解毒內托飲體虛瘡發治以內托預防陷肺宜用此方何首烏三錢生用甘草一錢當歸一錢五分赤芍一錢貝母一錢丹皮一錢黑豆三錢忍冬藤二錢水二杯煎服消風敗毒散人參獨活柴胡枯梗枳殼麵炒羌活茯苓川芎前胡甘草荊芥防風各一錢水二鍾姜三片煎八分食遠服升麻和氣飲治瘡腫癤疥癢痛甘草陳皮各兩半芍藥七錢五分大黃五錢煨乾葛蒼朮炒枯梗升麻各一兩當歸茯苓白芷各二兩乾薑枳殼各五錢三因方有厚朴五錢上咀片每服一兩水煎按此手足太陰陽明經也五積散世俗用之故收入蓋欲燥脾胃勝濕和氣為治瘡之要劑然臨症而不通變恐不合宜也五皮飲橘紅桑白皮生薑皮大腹皮茯苓皮上各一錢水煎服五苓散治下部濕熱瘡毒小便赤少澤瀉二兩五錢豬苓一兩五錢去皮肉桂七錢五分白朮赤茯苓各一兩五錢上為末每服三錢熱湯下除濕湯治寒濕所傷身體重著腰腳痠痛大便溏泄小便或澀或利半夏曲炒厚朴薑製蒼朮米泔水制各二兩藿香葉陳皮去白白茯苓去皮各一兩甘草七錢炙白朮生用一兩上咀片每服四錢水一杯姜七片棗二枚煎七分食前服腫腮腫腮一症是疫病非傷寒也是清邪中上焦非風熱也何以辨之一人病眾人亦病一村病村村皆病氣相感召傳染於人與風寒迥別為疫病之最輕者其症初起惡寒發熱脈浮數耳之前後作腫痛隱隱有紅色醫家不認症往往誤作傷寒施治牙腫混醫體實者表散亦愈體虛者不任大表邪乘虛而內陷傳入厥陰脈絡睪丸腫痛耳後全消明者或投溫里或投補水數劑可退昧者或用疏肝或作疝治一服神昏遍閱方書又無是症始終莫解此中機關而傷人性命者多多矣若世俗所稱大頭瘟頭面腮頤腫如瓜瓠乃疫病中之最重豈非為是症之確據哉又有時疫壞症神識昏迷邪陷厥少從耳後發出名曰遺毒治法與腫腮不同而醫者非進甘桔即用膏連邪復內陷萬無生理矣蓋耳之前後雖屬少陽而厥少部位亦會於此經曰頸項者肝之俞又曰腎開竅於耳甘桔牛蒡之屬非元氣虧敗遺毒所宜用之藥也余於腫腮體實者用甘枯湯加牛蒡丹皮當歸之屬一二劑可消體虛者用甘桔湯加何首烏玉竹丹皮當歸之屬二三劑亦愈如遺毒為害必須救陰以回津液補元以生真氣俾邪熱之毒從腫處盡發庶一線之生氣未斷也大抵初發辛涼治標而辛溫不可妄投變病養陰扶正而溫補亦宜善用司命者神明變化辨症用藥而不以此症作傷寒治也則得之矣以疫症為患而誤認傷寒為治是欲登山而揚帆矣一經點出乃開千古迷途功何偉哉甘桔湯見咳嗽門救陰保元湯治遺毒腫腮熟地二錢丹皮一錢山藥一錢麥冬一錢五分南沙參一錢黃耆一錢炙炙甘草八分黑豆三錢水煎服口角流涎口角流涎醫以為脾不攝也而藥投補脾孰知不盡在脾也而補脾藥多不效則束手無策矣蓋五液屬腎廉泉通任脈而亦屬腎人生血液之味皆咸惟舌下之液獨甘乃天一真水所生身中之至寶行經絡養筋骨潤腸胃生精血灌靈根者也古人有言遠唾不如近唾近唾不如不唾唾即津液也涎亦津液也而津液不綦重哉凡人夜臥之時心靜神斂則腎氣藏而廉泉穴閉若老年腎陰虧而氣不攝舌下兩穴寤寐皆開側臥枕間口角流涎液不藏矣故道家靜坐吞津舌抵上顎取廉泉穴開津液易於湧出而綿綿納下如是可以驗涎不攝之故皆由開而不合也明矣第此係經絡空虛受病亦淺然早衰之象已見於口角之間人其可不自惕歟夫偏中之候多責在腎水虧朝夕流涎流涎者生設口角乾燥而涎沫不流復中之禍立至精液枯腎氣絕非脾敗也曷不觀小兒初生時口涎終日不斷豈脾虛者乎亦小兒陽常有餘陰常不足腎氣不實故涎液妄溢可為老人偏中之確據矣或者謂脾開竅於口而為涎脾中有熱涎為火迫上溢口角亦常有之然必其人腎水素虛脾中始生虛熱若腎氣壯而脾陰足何口角流涎之與有經又不云乎胃緩則廉泉開廉泉開故涎下補足少陰是流涎雖在胃而實在腎更可知也吾故思之小兒流涎其常也偏中流涎是病也老人流涎老轉幼也吾為老人危矣一症自有一症真種子向來醫傢俱指脾虛一經勘破不啻撥雲見天噫以予觀於夫子賢於軒岐遠矣門人戴敏識八味地黃湯見審虛實門脾雖開竅於口而津液則出於腎足少陰之氣上交陽明戊癸相合而後能化水穀之精微氣不上交則水邪反從任脈而上於廉泉故涎下惟補足少陰以助下焦之生氣上升則任脈下盛而上之廉泉通則涎下於內不下於外矣主此立議可謂斯道中理析毫芒鼻淵嘗觀古人謂鼻淵一症乃寒凝腦戶太陽濕熱為病皆治標而不求其本攻邪而反耗其元於經旨迥乎不合其說可足信歟內經曰膽移熱於腦則辛頞鼻淵明明屬之內傷與外感全無關涉何醫家辛夷蒼耳防芷雜投致輕者重而重者危無非泥古書不化而虛實莫辨夭枉人命是可悲也夫腦屬神臟藏精髓而居高位鼻為肺竅司呼吸而聞香臭清陽由此而升濁陰無由而上是為平人而要非論膽熱及於腦腦熱及於鼻者也蓋少陽生髮之氣全賴腎水為之滋養腎水虛則膽中之火無制而上逆於腦腦熱蒸蒸氣化濁涕走空竅而出於鼻臭濁不堪聞涕愈下則液愈耗液愈耗則陰愈虧斯時也頭為之苦傾矣喉為之作咳矣身為之潮熱矣食飲為之減少矣而醫猶謂之曰風未散也表藥不可缺寒未退也辛味不可除曾不知辛散傷元有升無降有陽無陰腎肝虛於下而肺氣虛於上雖有盧扁其奈之何哉雖然膽之火胡為而入腦也經謂其脈起於目銳眥上抵頭角下耳後曲折布於腦後脈絡貫通易於感召惟其虛也則灼腦炙髓陰液下漏治法宜戒怒以養陽絕欲以養陰藥進補水保肺而藿香牛腦尤為必用之藥俾水壯火熄木榮金肅膽汁充滿而生之氣流行火自安其位矣倘脾胃漸虧陽分漸弱壯水之法又宜變通或脾腎雙補或陰陽兩救庶幾於病有濟而不致錯誤也且腦為諸陽之會髓為至精之物鼻屬金氣之路治腦也補在髓治鼻也清在金腦滿可以生水而制火金空可以化液而制木而春升少陽之氣與厥陰相為表裡上屬於腦如此則內經謂膽熱所關義亦明矣馮氏有言鼻淵乃風熱灼腦而液下滲或黃或白或帶血如膿狀此腎虛之症也斯言極中病情第此風非外入之風乃肝膽火勝而熱極風生也若寒凝腦戶濕熱為病較馮氏之說不啻霄壤之隔治鼻淵者其可不知清竅無壅陽開陰合之理而深玩味也哉治以腎為主暢所欲言可補前人之未備益氣湯治鼻病過於解散其治流清涕者繼成濁涕漸而腥穢黃赤間雜皆由滲開腦戶日積月累而致尫羸用此湯治之黃耆一錢五分蜜水炒人參一錢白朮一錢炒當歸一錢麥冬一錢炙甘草五分藿香一錢五味子十粒虛寒少入細辛內熱監以山梔加薑棗水煎服補腦丸治鼻淵久不愈者神效此上病下取高者抑之之治也人參一兩麥冬二兩去心茯苓一兩五錢人乳拌蒸熟地二兩萸肉一兩蒸黃耆二兩蜜灸枸杞子二兩酒蒸菟絲子二兩酒蒸鹿茸一兩五錢酥炙五味子一兩蜜水拌焙牛腦一具蒸熟搗入上為末蜜丸桐子大每服四錢失榮失榮一症經謂先富後貧先貴後賤心志屈辱神氣不伸而憂煎日切奉養日廉始有此患也夫營屬陰血衛屬陽氣脈中脈外乃往來之道路故百骸得以榮養經絡得以流通又何至脫營失精而病從內生哉無如稟賦素虛平日以酒為漿以妄為常醉以入房欲竭其精以耗散其真而鬱火相凝隧痰停結乃成是症其患多生肩之上下初起微腫皮色不變日久漸大堅硬如石推之不移按之不動半載一年方生陰痛或破爛紫斑滲流血水或泛如蓮穢氣薰蒸病勢至此氣血衰敗形容瘦削未有不斃者矣蓋肝主謀慮心主血脈腎主五液思慮多則傷肝精神耗則傷心精液少則傷腎肝傷則筋不榮而腫心傷則血不生而枯腎傷則液不潤而塞漫腫無頭發在關節病雖在經根實在臟譬之樹木根搖而枝葉已先萎矣奈何醫家誤認流痰癰毒藥進清涼表散愈耗陰血是速其危也不知流痰之發堅而痛痛而紅紅而腫腫而潰在陰則平塌不紅不腫不痛數日立斃失榮則堅久隱痛皮色如故數載乃亡也其見症之不同治法之各異安可不細辨乎初起宜六味歸芍湯久久服之救其根也病久隱痛陰虧者宜左歸加生脈湯補其元也陽虧者宜十全大補湯培血氣也雖然六慾不遂損傷中氣枯於外而及於內耗其氣而傷其形如婦人之乳岩男婦之瘰癧皆精血虧而真元敗大筋短而小筋攣其症豈草根木皮所能勝任哉若經謂陷脈為瘤與失榮相肖但此乃經脈為病臟氣安然觀其所發皆非關節之處可以驗其輕重矣病本難療而立論以救之一片婆心和盤托出六味歸芍湯見中風門左歸飲茯苓一錢五分山藥二錢甘草一錢炙枸杞子二錢熟地二三錢或加至一二兩山萸肉一二錢畏酸者少用水二鍾煎七分食遠服生脈散十全大補湯均見盜汗門吐蛔吐蛔一症內傷者有熱有寒有虛有實有風木所化有濕熱所生小兒最多胃脘脅痛者亦復不少必兼嘔酸痰水輕重不一治法熱者清之寒者溫之虛者補之風木所化者平之濕熱所生者清利之法固善矣第物必先腐而後蟲生縱實熱為害先暫治標而後求本即虛熱為災宜急治本而決無標可求否則蟲可殺而人獨不可殺耶如時令吐蛔始得之二三日壯熱如烙口渴引飲喜食涼水梨漿舌苔黃厚手足冷不過肘大便秘結小便赤澀其人壯實年富力強平素無病脈洪大而數或細數有力者乃邪熱在胃蟲為熱迫不能自容上逆而出宜清熱逐疫邪解熱退而蛔自安如麥冬丹皮貝母黑豆甘草銀花黃泥黃連地骨皮之屬投之此治熱深厥亦深胃熱有餘之吐蛔也然亦有胃寒之人二三日吐蛔在胃而不在厥陰者即投理中湯治之勿泥胃熱而概用涼藥也如七八日後身微熱口不渴不思涼水梨漿舌苔雖黃厚而潤手足冷過肘膝出冷汗小便清大便利其人體弱或平素有病或屬老人或屬幼稚脈虛大按之不應指或細遲按之全無神者乃邪傳厥陰胃中寒冷蛔亦不能自安宜溫胃補肝腎餘邪始退蛔蟲亦安理中湯加人參桂附丁香烏梅之屬或八味湯加人參菟枸耆朮之屬投之此治厥陰虛寒大虛之吐蛔也夫內傷吐蛔責在脾而先責在腎時令吐蛔治在邪而先治在正不知此而遂謂之善醫乎若庸手謂余不明時令一症而彼竟以時令吐蛔殺人故憤憤不平因述內傷時令吐蛔不同治備言時令吐蛔有胃病厥陰病兩種立有一定之治法也願諸子熟讀是篇依法救人庶不錯誤倘他日遇時令吐蛔而仍誤投醫藥不遵余法豈非以人命為兒戲耶景岳云凡絕處得生皆在根本真處得之讀此足與相發明理中湯見濕症門八味湯見審虛實門吐屎吐屎一症古書所未載大約其標在胃其本在腎幽門失開闔之職也經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈是清者上升而運行精微濁者下降而變化糟粕安得穢濁之物直透幽門逆上反從清道出哉無如腎水虛則火走腑道無形之火而沖逆者其常也無形之火挾有形穢物而沖逆者其變也喻氏有地氣加天之說得毋與此症隱隱有合而倒行逆施於理法之所無而病情之所有者其為幽門關鎖之地為病胃氣虧於中而腎氣虧於下者耶不然者膈噎之吐未見吐屎也反胃之吐未見吐屎也脫瘀之吐未見吐屎也更有嘔酸苦汁痰飲蛔蟲未見吐屎也而茲則陰陽錯亂清濁混淆為醫家所不及逆料者洵為幽門無權胃液空虛腎火迫之又迫而不足以敵直奔之勢從小腸入胃糟粕隨之已可知矣治法非救胃則救腎非正治則逆治經曰腎者胃之關又曰腎主開闔開竅於二陰又曰清陽出上竅濁陰出下竅必待腎陰回而虛火藏大便通而機關利清陽升而濁陰降此理之所必然者倘認為實熱不顧斯人元氣治標而不治本耑於攻下如承氣等湯急進正呂氏所謂矢醫惟知通矢耳而去生遠矣或者謂諸逆沖皆屬於火小腸與心相表裡亦主有火而滓穢又屬火化可為此症實熱之確據第不知體實脈實初病屬實火者亦或有之若體虛脈虛久病而屬虛火者比比皆是內經病機之條不可泥看也彼吐屎之症又安可概以實火治乎創論極確古人復起不易吾言矣清胃平逆散治吐屎初病火者此方主之生地三錢丹皮一錢五分茯苓一錢五分知母一錢花粉一錢杏仁二錢去皮尖扁豆二錢炒黑豆五錢蘆根五錢水煎服救腎安逆湯治久病體虛脈虛此方主之熟地三錢丹皮一錢澤瀉一錢山藥一錢茯苓一錢萸肉一錢沙參一錢五穀蟲一錢四分酒炒研末水煎服鼓脹脈洪大者生產後脈數大者死鼓脹者中空似鼓腹皮繃急是也其症單腹作腫四肢身面無氣多得之農夫輩濕熱為患脾土受傷與中滿病在氣分之遍身腫在水分之皮膚亮而根發於腎者迥乎不同也夫鼓脹責在脾胃乃水穀出入之道路較他臟之病為稍輕虛中挾實較中滿之治為稍異故此症專以救脾陰為主蓋脾陰足則萬邪息脾土健而濕熱消仍宜戒鹽食淡恐助濕而生脹是以全活者十中有六七耳經云諸腹脹大皆屬於熱諸濕腫滿皆屬於脾脈經云腹脹脈浮大是出厄也可見鼓症之脈洪大皆由濕熱積於內陰血虛而陽氣存脾胃生火故脈象如是豈非不足中而屬有餘之症乎舟車禹功等湯非為此種病而設乎若產後脈數大者則不然蓋產後陰血驟虧孤陽上越症則發熱脈則數大最為危險之候何也陽浮而陰涸營衛之氣疾速致手太陰之脈反現數大之假象且胎下之後內臟空虛脈細弱者於法之所宜是虛症而得虛脈也脈數大者於法所不合是虛症而得實脈也景岳云陰陽俱虧氣血敗亂脈必急數愈數者愈虛愈虛者愈數治產後者可不法景岳乎倘產後而得血鼓之症洪大亦凶數大更危正經所謂陽絡傷則血外溢陰絡傷則血內盜之旨而實象之脈萬不可見也彼農夫輩濕熱內結成鼓與產後血結而成鼓者以脈合症又不啻天淵之隔矣嗚呼持脈有道虛靜為保得之於手應之於心庶指下了然否則四診且不識為何象而欲求其鼓病利於洪大產後不利於數大者吾見其茫然指下而舌辨嘵嘵假以為善診而已矣或分或合確有至理非同浮論舟車丸青皮陳皮木香檳榔各五分黑牽牛四兩大黃二兩甘遂麵裹煨大戟醋炒芫花醋炒各一兩輕粉一錢上為末水法為丸如綠豆大每空心溫水下初服五丸日三服以快利為度禹功散黑牽牛四兩茴香一兩炒上為細末以生薑自然汁調一二錢服十全大補湯見盜汗門
